- label: Within-Domain Linkage
  layer: Layer B -- linkage
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    The project uses or links two or more datasets that all fall within the same policy domain.
  inclusion_rules: |
    Assign where multiple datasets are listed but they belong to the same substantive policy domain, regardless of whether they come from the same provider.
  exclusion_rules: |
    Do not assign merely because datasets share a provider. Large providers such as ONS supply datasets across multiple policy domains, so provider identity is not sufficient. If datasets span two or more policy domains, assign Cross-Domain Linkage.
  examples:

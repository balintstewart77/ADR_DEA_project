metadata:
  title: Taxonomy Data Dictionary -- DEA Project Classification Ontology v3.4
  generated: '2026-05-22'
  source: git history and v3.3 classification prompt
  taxonomy_owner: "Project Lead, DEA Dashboard"
  notes:
  - Cells prefixed (from prompt) or (historical, from prompt) are extracted verbatim from the v3.3 classification prompt.
  - This file is the single source of truth. CSV or Markdown renderings are generated from it.
  - Project counts are not stored in this dictionary. They change with each classification run
    and are reported separately from the latest v4 classification output.
  v3_4_changes:
  - 'Layer A: "Gender, Race & Ethnicity" removed (replaced by cross-cutting tag). "Poverty, Inequality & Living Standards"
    relabelled to "Poverty, Wealth & Living Standards". "Unclear from Title" renamed to "Unclear from Register Entry".
    12 active domains + Unclear from Register Entry.'
  - 'Layer B: "Unclear from Title" renamed to "Unclear from Register Entry". 3 active linkage modes + Unclear from Register Entry.'
  - 'Layer C: "Inequality / Disparities Analysis" removed. "Unclear from Title" renamed to "Unclear from Register Entry".
    7 active purposes + Unclear from Register Entry.'
  - 'New: Cross-cutting demographic-disparities/equity tag, orthogonal to the three layers.'
  code_discrepancies:
  - 'DOMAINS list (line 97): still includes "Gender, Race & Ethnicity" and "Poverty, Inequality & Living Standards".'
  - 'DOMAIN_LITERALS (line 233): same.'
  - 'DOMAIN_GUIDANCE (line 114): still includes entry 11 for "Gender, Race & Ethnicity" and entry 6 as "Poverty, Inequality
    & Living Standards".'
  - 'PURPOSES list (line 187): still includes "Inequality / Disparities Analysis".'
  - 'PURPOSE_LITERALS (line 257): same.'
  - 'PURPOSE_GUIDANCE (line 199): still includes "Inequality / Disparities Analysis" entry.'
  - 'CLASSIFICATION_EXAMPLES (line 499): Examples 6 and 7 reference removed categories.'
  - 'Cross-cutting tag: not yet implemented in code.'
  - 'PROMPT_VERSION (line 87): still "v3.3".'
  - '"Unclear from Title" rename to "Unclear from Register Entry" not yet applied in code (DOMAINS, LINKAGE_MODES, PURPOSES,
    _LITERALS types, prompt guidance, dashboard UI). Dictionary-only change in v3.4; code change is a separate v3.4 task.'
  balance_note: >
    Balance: the categories vary considerably in size. Some Layer C purposes — notably Risk Prediction /
    Early Identification and Service Interaction / Systems Analysis — are small. They are retained as genuine,
    conceptually distinct analytical purposes and on future-proofing grounds (these kinds of research are
    expected to become more common). No claim is made about trends over time in these small categories:
    at their current size, year-on-year variation is not statistically meaningful and should not be read as a trend.
  covid_category_type_note: >
    COVID-19 & Pandemic is retained as a Layer A domain but is a category-type anomaly: unlike the other
    domains, which are policy/sector areas, it is a time-bounded event that cuts across domains (its own
    inclusion rule directs that it be assigned alongside a substantive domain). This is the same category-type
    issue that led to the removal of "Gender, Race & Ethnicity" from Layer A. Whether COVID-19 should likewise
    be converted from a domain to a cross-cutting tag is a documented open question, to be decided after v4
    validation; it is not changed in v3.4.
  adr_uk_theme_alignment:
    description: >
      Mapping of this dictionary's Layer A domains to ADR UK's seven research themes, for interoperability
      reference under the ONS framework's interoperability principle. This alignment is a comparison, not an
      adoption: the dictionary's domains were derived inductively from the DEA register and diverge from ADR UK's
      themes where the register's scope is broader.
    source: "ADR UK website research themes page"
    accessed: "2026-05-22"
    adr_uk_themes:
    - Housing & communities
    - Health & wellbeing
    - Children, young people & education
    - Employment & the economy
    - Climate & the environment
    - Social mobility & inclusion
    - Crime & justice
    mapping:
      Labour Market & Employment:
        adr_uk_theme: "Employment & the economy"
        alignment_type: "close"
        note: "Covers labour-market research; ADR UK theme also includes wider economic activity."

      Education & Skills:
        adr_uk_theme: "Children, young people & education"
        alignment_type: "close"
        note: "Close match for education and skills research, although this ontology also includes adult skills and workforce training."

      Health & Social Care:
        adr_uk_theme: "Health & wellbeing"
        alignment_type: "close"
        note: "Close match, with this ontology using a more service-facing health and social care label."

      Crime & Justice:
        adr_uk_theme: "Crime & justice"
        alignment_type: "close"
        note: "Direct match."

      Business & Productivity:
        adr_uk_theme: "Employment & the economy"
        alignment_type: "partial"
        note: "ADR UK combines employment and economy; this ontology separates firm/productivity research from labour-market research because the DEA register contains substantial business-data use."

      Poverty, Wealth & Living Standards:
        adr_uk_theme: "Social mobility & inclusion"
        alignment_type: "partial"
        note: "Partial overlap only. ADR UK's theme is broader, covering social mobility and inclusion; this ontology narrows the domain to material resources, poverty, wealth, benefits, debt, and living standards."

      Housing & Planning:
        adr_uk_theme: "Housing & communities"
        alignment_type: "close"
        note: "Close match, though this ontology foregrounds housing, planning and residential conditions."

      Migration & Demographics:
        adr_uk_theme: null
        alignment_type: "none"
        note: "No direct ADR UK equivalent. Migration, fertility, mortality and population structure appear as cross-cutting concerns rather than a dedicated ADR UK theme."

      Environment & Agriculture:
        adr_uk_theme: "Climate & the environment"
        alignment_type: "partial"
        note: "Partial overlap. ADR UK's theme emphasises climate and environment; this ontology also includes agriculture, land use and farming because these appear in the DEA register."

      Public Finance & Taxation:
        adr_uk_theme: null
        alignment_type: "none"
        note: "No direct ADR UK equivalent. Public finance and taxation are retained because the DEA/SRS portfolio includes fiscal, tax and public-expenditure research."

      COVID-19 & Pandemic:
        adr_uk_theme: null
        alignment_type: "none"
        note: "No direct ADR UK equivalent. COVID-19 is a time-bounded cross-domain event rather than a standing ADR UK research theme."

      Data Infrastructure & Methodology:
        adr_uk_theme: null
        alignment_type: "none"
        note: "No direct ADR UK equivalent. Methodological and data-infrastructure research is retained as a domain because it is visible in the DEA register."
        
categories:
- label: Labour Market & Employment
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning work, employment, labour-market participation, and workforce dynamics. Includes wages and earnings; employment, unemployment, inactivity and underemployment; job quality, working hours, contracts and working conditions; labour supply and demand; occupational, sectoral and geographic mobility; workforce recruitment and retention; skills demand and mismatch; and transitions into, through, or out of work.
  inclusion_rules: |
    Assign when work, employment, earnings, labour supply or demand, workforce composition, job quality, occupational structure, or labour-market transitions are central to the project.
  exclusion_rules: |
    Do not assign solely because a project mentions income, education, productivity, health, migration, or workers. Use **Education & Skills** for education systems and qualifications unless labour-market outcomes are central. Use **Poverty, Wealth & Living Standards** for household resources, poverty, wealth, debt, or living standards unless employment/earnings are the main object.
  examples:
    - project_id: "2019/003"
      title: "The fall of the labour share and rise of the superstar region..."
      assign: "Labour Market & Employment"
      likely_co_labels:
        - "Possible: Business & Productivity"
      rationale: "Labour share and earnings make the labour-market domain mandatory; firm/productivity dynamics may also be central."
    - project_id: "2020/021"
      title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
      assign: "Labour Market & Employment"
      likely_co_labels:
        - "Poverty, Wealth & Living Standards"
        - "Policy Evaluation / Impact Analysis"
      rationale: "Employment, hours and earnings are central; household income may also bring in material living standards; National Living Wage is a named policy."
    - project_id: "2021/027"
      title: "SEARCH, SKILLS AND SATISFACTION: THE EMPLOYMENT TRAJECTORIES OF REFUGEES IN THE UK"
      assign: "Labour Market & Employment"
      likely_co_labels:
        - "Migration & Demographics"
        - "Life-Course / Trajectory Analysis"
      rationale: "Employment trajectories make this labour-market research; refugee status brings in migration/demography."
  counterexamples:
    - project_id: "2020/013"
      title: "Firm-level analysis of research and development"
      replacement: "Business & Productivity"
    - project_id: "2020/008"
      title: "Contextualised Admissions and University Choice"
      replacement: "Education & Skills"
- label: Education & Skills
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning education, learning, training, skills formation, and transitions through education systems. Includes early years, schools, colleges, universities, qualifications, apprenticeships, admissions, attainment, attendance, teacher workforce issues, childcare, and education-to-work pathways.
  inclusion_rules: |
    Assign when the project's substantive focus is educational participation, attainment, qualifications, admissions, skills acquisition, apprenticeship pathways, school absence, teacher supply, or educational progression.
  exclusion_rules: |
    Do not assign merely because a project uses education data if the research question is mainly about employment, health, crime, poverty, or demography. Add **Labour Market & Employment** where the project studies employment or earnings outcomes after education.
  examples:
    - project_id: "2020/117"
      title: "Participation in and Progression Through Education in Wales: The Role of Family"
      assign: "Education & Skills"
      likely_co_labels:
        - "Life-Course / Trajectory Analysis"
        - "possible Poverty, Wealth & Living Standards"
      rationale: "Educational participation and progression are central; family background may bring in material conditions depending on detail."
    - project_id: "2020/008"
      title: "Contextualised Admissions and University Choice"
      assign: "Education & Skills"
      likely_co_labels:
        - "Policy Evaluation / Impact Analysis if contextual admissions policy is evaluated"
      rationale: "Admissions and university choice are education-system topics."
    - project_id: "2024/259"
      title: "Risk index of NEET for local authority use"
      assign: "Education & Skills"
      likely_co_labels:
        - "Labour Market & Employment"
        - "Risk Prediction / Early Identification"
      rationale: "NEET sits at the education-work boundary; \"risk index\" makes the predictive purpose explicit."
  counterexamples:
    - project_id: "2020/010"
      title: "Local labour market effects of immigration"
      replacement: "Labour Market & Employment / Migration & Demographics"
    - project_id: "2020/012"
      title: "Wage progression and firm productivity"
      replacement: "Labour Market & Employment / Business & Productivity"
    - project_id: "2022/139"
      title: "Understanding and predicting health and social care utilisation..."
      replacement: "Health & Social Care"
- label: Health & Social Care
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning health, illness, mortality, wellbeing, clinical outcomes, health services, public health, mental health, social care, and care-system use. Includes NHS services, hospitals, GP care, palliative care, maternity, morbidity, mortality where health is the research object, and adult or children's social care.
  inclusion_rules: |
    Assign when the project studies health outcomes, healthcare access, mental health, mortality as a health outcome, social care, care pathways, service utilisation, clinical risk, morbidity, or wellbeing with a health focus.
  exclusion_rules: |
    Do not assign mortality projects automatically. Use **Migration & Demographics** for mortality as a demographic/population outcome. Use **Service Interaction / Systems Analysis** as the purpose where the focus is pathways through services rather than health outcomes.
  examples:
    - project_id: "2019/005"
      title: "Measuring the impact of hearing loss on well-being"
      assign: "Health & Social Care"
      likely_co_labels:
        - "Outcome Tracking"
      rationale: "Hearing loss and wellbeing are health-related outcomes; \"impact\" suggests exposure-outcome analysis."
    - project_id: "2019/021"
      title: "Social and Economic Predictors of the severe mental disorders..."
      assign: "Health & Social Care"
      likely_co_labels:
        - "Poverty, Wealth & Living Standards"
        - "Outcome Tracking"
      rationale: "Severe mental disorder is the health outcome; social/economic predictors may bring in material conditions."
    - project_id: "2024/216"
      title: "Psychosocial disadvantage in pregnancy: risk of severe maternal morbidity and adverse perinatal outcomes and the role of antenatal care."
      assign: "Health & Social Care"
      likely_co_labels:
        - "Poverty, Wealth & Living Standards"
        - "Risk Prediction / Early Identification or Outcome Tracking"
      rationale: "Pregnancy morbidity is health-focused; disadvantage may be a socioeconomic exposure."
  counterexamples:
    - project_id: "2020/092"
      title: "Understanding Recent Fertility in the UK..."
      replacement: "Migration & Demographics / Methodological"
    - project_id: "2019/025"
      title: "Understanding the uptake and use of the Northern Ireland Concessionary Fares Scheme for the population aged 60 and over"
      replacement: "Migration & Demographics / Service Interaction"
    - project_id: "2020/058"
      title: "Movers and stayers: explaining variation in residential energy consumption using longitudinal observations of annual energy consumption in moving households"
      replacement: "Environment & Agriculture"
- label: Crime & Justice
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning crime, victimisation, public safety, offending, policing, courts, prisons, probation, sentencing, family justice, civil justice, reoffending, and criminal records.
  inclusion_rules: |
    Assign when the project's substantive focus is offending, victimisation, domestic abuse, policing, courts, sentencing, imprisonment, probation, youth justice, family justice, civil justice, or justice-system outcomes.
  exclusion_rules: |
    Do not assign merely because a project studies "risk", "fairness", "violence", or "families" unless the justice system, criminal behaviour, legal proceedings, or victimisation are central.
  examples:
    - project_id: "2019/006"
      title: "Analysis of victimisation data from the Crime Survey for England and Wales"
      assign: "Crime & Justice"
      likely_co_labels:
        - "Descriptive Monitoring"
      rationale: "Victimisation and crime survey analysis are justice/public-safety topics."
    - project_id: "2021/038"
      title: "Using linked Magistrates and Crown Court data..."
      assign: "Crime & Justice"
      likely_co_labels:
        - "Within-Domain Linkage"
        - "Life-Course / Trajectory Analysis"
      rationale: "Courts data place this in justice; repeated appearances over time suggest trajectory analysis."
    - project_id: "2023/073"
      title: "Domestic abuse proceedings in family courts..."
      assign: "Crime & Justice"
      likely_co_labels:
        - "Service Interaction / Systems Analysis"
        - "possible Health & Social Care"
      rationale: "Family court proceedings and domestic abuse pathways are justice-system topics."
  counterexamples:
    - project_id: "2019/022"
      title: "Research on homeless mortality..."
      replacement: "Housing & Planning / Health & Social Care"
    - project_id: "2023/006"
      title: "Ethnic Minority British Election Study pilot"
      replacement: "Migration & Demographics"
    - project_id: "2024/216"
      title: "Psychosocial disadvantage in pregnancy: risk of severe maternal morbidity and adverse perinatal outcomes and the role of antenatal care."
      replacement: "Health & Social Care"
- label: Business & Productivity
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning firms, business activity, industrial structure, innovation, productivity, entrepreneurship, trade, exports, foreign direct investment, research and development, business support, and firm-level performance.
  inclusion_rules: |
    Assign when the project studies firms, business behaviour, productivity, innovation, investment, exporting, enterprise support, start-ups, industrial policy, business surveys, or firm-level outcomes.
  exclusion_rules: |
    Do not assign simply because a project uses firm-level data if the substantive question is mainly about workers, wages, public finance, or environmental impacts. Add **Labour Market & Employment** where jobs, wages, workforce composition, or employment outcomes are central.
  examples:
    - project_id: "2019/011"
      title: "Modelling Return on Investment at the firm level"
      assign: "Business & Productivity"
      likely_co_labels:
        - "Outcome Tracking or Descriptive Monitoring"
      rationale: "Firm-level ROI is a business-performance topic."
    - project_id: "2020/013"
      title: "Firm-level analysis of research and development"
      assign: "Business & Productivity"
      likely_co_labels:
        - "Methodological / Infrastructure Research only if method-focused"
      rationale: "R&D and firm-level analysis sit squarely in business/productivity."
    - project_id: "2020/024"
      title: "Assessing the impact of UK Enterprise Zones"
      assign: "Business & Productivity"
      likely_co_labels:
        - "Policy Evaluation / Impact Analysis"
        - "possible Labour Market & Employment"
      rationale: "Enterprise Zones are business/economic policy; employment outcomes may add labour-market domain."
  counterexamples:
    - project_id: "2020/012"
      title: "Wage progression and firm productivity"
      replacement: "Labour Market & Employment plus Business & Productivity"
    - project_id: "2020/019"
      title: "The impact of government expenditure on employment and wages: evidence from firm-level data for the UK"
      replacement: "Public Finance & Taxation / Labour Market & Employment"
    - project_id: "2020/021"
      title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
      replacement: "Labour Market & Employment"
- label: Poverty, Wealth & Living Standards
  layer: Layer A -- domain
  status: relabelled v3.4
  version_added: v3
  version_changed: v3.4
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning material resources, economic hardship, household living standards, poverty, wealth, debt, savings, benefits, deprivation, food security, cost of living, household income, and distribution of resources.
  inclusion_rules: |
    Assign when the project's substantive focus is poverty, household income, wealth, savings, debt, benefits, deprivation, food insecurity, living standards, economic hardship, or household resources.
  exclusion_rules: |
    Do not assign solely because a title mentions pay gaps, employment, or socioeconomic differences. Use **Labour Market & Employment** for wages, pay, earnings, job status, and occupational outcomes unless household resources or poverty are central. Comparison of material conditions (poverty, income, wealth) across demographic groups (e.g. by age cohort, ethnicity, or sex) qualifies for the **Demographic disparities / equity tag** in addition to this domain.
  examples:
    - project_id: "2019/015"
      title: "Understanding saving behaviour in the UK"
      assign: "Poverty, Wealth & Living Standards"
      likely_co_labels:
        - "Descriptive Monitoring or Outcome Tracking"
      rationale: "Saving behaviour concerns household resources and financial resilience."
    - project_id: "2020/017"
      title: "Subjective wellbeing impacts of debt and debt-related factors"
      assign: "Poverty, Wealth & Living Standards"
      likely_co_labels:
        - "Health & Social Care"
        - "Outcome Tracking"
      rationale: "Debt is a material-resource issue; wellbeing makes health/social outcomes relevant."
    - project_id: "2021/050"
      title: "Cohort Comparisons of Wealth"
      assign: "Poverty, Wealth & Living Standards"
      likely_co_labels:
        - "Migration & Demographics"
        - "Descriptive Monitoring"
        - "Demographic disparities / equity tag"
      rationale: "Wealth distribution across cohorts is material living-standards research; age-cohort comparison qualifies for the demographic-disparities tag."
  counterexamples:
    - project_id: "2020/018"
      title: "Inequalities in the 21st Century – Chapter on Labour Market Inequality"
      replacement: "Labour Market & Employment"
    - project_id: "2020/021"
      title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
      replacement: "Labour Market & Employment; add Poverty/Wealth only if household income is central"
    - project_id: "2022/190"
      title: "Ethnic inequalities in mortality"
      replacement: "Health & Social Care plus demographic-disparities tag"
- label: Housing & Planning
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning housing, homelessness, residential conditions, tenure, home ownership, planning systems, neighbourhoods, gentrification, residential mobility, and place-based housing or planning interventions.
  inclusion_rules: |
    Assign when housing, homelessness, residential tenure, home ownership, housing markets, planning decisions, neighbourhood conditions, or residential mobility are central to the research question.
  exclusion_rules: |
    Do not assign merely because a project mentions "home", "place", "local area", or "stay at home" unless housing, residential conditions, or planning are substantive objects. Use **Environment & Agriculture** where domestic energy consumption or environmental exposure is central.
  examples:
    - project_id: "2019/016"
      title: "Homeownership of the young"
      assign: "Housing & Planning"
      likely_co_labels:
        - "Migration & Demographics"
        - "possible Poverty, Wealth & Living Standards"
      rationale: "Homeownership is housing; age cohort and affordability may add other domains."
    - project_id: "2019/022"
      title: "Research on homeless mortality among St Mungo's clients"
      assign: "Housing & Planning"
      likely_co_labels:
        - "Health & Social Care"
        - "Outcome Tracking"
      rationale: "Homelessness is central; mortality makes health relevant."
    - project_id: "2019/024"
      title: "The Right to Buy: Migration and Gentrification"
      assign: "Housing & Planning"
      likely_co_labels:
        - "Migration & Demographics"
        - "Policy Evaluation / Impact Analysis"
      rationale: "Right to Buy and gentrification are housing/planning topics with migration effects."
  counterexamples:
    - project_id: "2020/058"
      title: "Movers and stayers: explaining variation in residential energy consumption using longitudinal observations of annual energy consumption in moving households"
      replacement: "Environment & Agriculture"
    - project_id: "2020/056"
      title: "Factors Predicting Adherence Stay at Home Guidance During COVID-19 Pandemic in the United Kingdom"
      replacement: "COVID-19 & Pandemic"
    - project_id: "2019/007"
      title: "Thriving Places index – indicators of wellbeing at local authority level"
      replacement: "place-based monitoring, not necessarily Housing & Planning unless housing/neighbourhood conditions are central"
- label: Migration & Demographics
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning population structure, population change, migration, immigration, population mobility, fertility, ageing, mortality as a demographic outcome, census-based population analysis, and demographic composition.
  inclusion_rules: |
    Assign when the project studies migration flows, immigration policy, population movement, demographic change, fertility, ageing, census populations, population projections, or mortality as part of demographic structure.
  exclusion_rules: |
    Do not assign solely because a project includes ethnicity, age, or migrant status as a subgroup. Use **Labour Market & Employment** for migrant employment or earnings if labour-market outcomes are central. Use **Health & Social Care** for mortality or morbidity where the research question is health-focused.
  examples:
    - project_id: "2019/026"
      title: "Migration Observatory analysis of EU and non-EU migration in the UK"
      assign: "Migration & Demographics"
      likely_co_labels:
        - "Descriptive Monitoring"
      rationale: "Migration flows and migrant characteristics are demographic topics."
    - project_id: "2019/012"
      title: "The impact of the immigration white paper on the Northern Ireland economy"
      assign: "Migration & Demographics"
      likely_co_labels:
        - "Business & Productivity"
        - "Policy Evaluation / Impact Analysis"
      rationale: "Immigration policy is demographic; economic impacts may add business/economy."
    - project_id: "2020/092"
      title: "Understanding Recent Fertility in the UK..."
      assign: "Migration & Demographics"
      likely_co_labels:
        - "Methodological / Infrastructure Research"
        - "Descriptive Monitoring"
      rationale: "Fertility is demographic; methodology is explicit in the title."
  counterexamples:
    - project_id: "2020/010"
      title: "Local labour market effects of immigration"
      replacement: "Labour Market & Employment, with Migration & Demographics if immigration itself is central"
    - project_id: "2022/190"
      title: "Ethnic inequalities in mortality"
      replacement: "Health & Social Care plus demographic-disparities tag"
    - project_id: "2020/080"
      title: "Economic Cycles and Labour Market Outcomes of Migrants and Natives"
      replacement: "Labour Market & Employment plus Migration & Demographics"
- label: Environment & Agriculture
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning the natural environment, climate, energy, agriculture, farming, land use, pollution, decarbonisation, environmental policy, domestic or industrial energy use, and environmental impacts of economic or social activity.
  inclusion_rules: |
    Assign when the project studies energy consumption, climate policy, decarbonisation, agriculture, farms, land use, environmental exposure, pollution, green transitions, or environmental dimensions of households, firms, or places.
  exclusion_rules: |
    Do not assign because the word "environment" appears in a non-natural-environment sense, such as "economic environment". Use **Business & Productivity** where an energy or climate programme is primarily framed as firm innovation or productivity, but add Environment where environmental outcomes are central.
  examples:
    - project_id: "2020/099"
      title: "Estimation of energy demand drivers and the effect of public policies on consumption under the climate emergency"
      assign: "Environment & Agriculture"
      likely_co_labels:
        - "Policy Evaluation / Impact Analysis"
      rationale: "Energy demand and climate emergency are environmental topics; public policies are explicitly mentioned."
    - project_id: "2020/058"
      title: "Movers and stayers: explaining variation in residential energy consumption using longitudinal observations of annual energy consumption in moving households"
      assign: "Environment & Agriculture"
      likely_co_labels:
        - "Housing & Planning"
        - "Outcome Tracking"
      rationale: "Residential energy use is environmental/energy research, with housing context."
    - project_id: "2021/090"
      title: "AD|ARC : Linking Individual and Farm Level Data for Agricultural Research - Wales Workstream"
      assign: "Environment & Agriculture"
      likely_co_labels:
        - "Cross-Domain Linkage"
        - "possible Poverty, Wealth & Living Standards"
      rationale: "Farm/agricultural data are central; individual-farm linkage may add household/material dimensions."
  counterexamples:
    - project_id: "2019/023"
      title: "Economic environment and child development"
      replacement: "Education & Skills / Outcome Tracking"
    - project_id: "2020/002"
      title: "Evaluation of the Energy Entrepreneurs Fund"
      replacement: "Business & Productivity; add Environment only if environmental outcomes are central"
    - project_id: "2020/051"
      title: "Measuring the impact of social distancing on firm productivity"
      replacement: "COVID-19 & Pandemic / Business & Productivity"
- label: Public Finance & Taxation
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning government revenue, taxation, tax compliance, tax credits, public expenditure, public spending, fiscal transfers, business rates, tax reliefs, and fiscal policy.
  inclusion_rules: |
    Assign when the project studies tax policy, tax behaviour, tax compliance, government expenditure, public spending, fiscal transfers, tax credits, business rates, or distributional impacts of fiscal policy.
  exclusion_rules: |
    Do not assign to private wealth transfers, household wealth, firm investment, or business outcomes unless the public finance/tax mechanism is central. Use **Business & Productivity** for firm outcomes of business-support schemes unless fiscal design or tax/public spending is the main object.
  examples:
    - project_id: "2020/001"
      title: "How does tax affect incorporation and business outcomes?"

metadata:
  title: Taxonomy Data Dictionary -- DEA Project Classification Ontology v3.4
  generated: '2026-05-21'
  source: git history and v3.3 classification prompt
  notes:
  - Cells prefixed [DRAFT] are Claude Code draft expository definitions requiring author review.
  - Cells prefixed (from prompt) or (historical, from prompt) are extracted verbatim from the v3.3 classification prompt.
  - Cells marked [AUTHOR TO WRITE] or [AUTHOR TO CONFIRM] require authoring before use in the v4 prompt.
  - This file is the single source of truth. CSV or Markdown renderings are generated from it.
  v3_4_changes:
  - 'Layer A: "Gender, Race & Ethnicity" removed (replaced by cross-cutting tag). "Poverty, Inequality & Living Standards"
    relabelled to "Poverty, Wealth & Living Standards". 12 active domains + Unclear from Title.'
  - 'Layer B: Unchanged. 4 categories.'
  - 'Layer C: "Inequality / Disparities Analysis" removed. 7 active purposes + Unclear from Title.'
  - 'New: Cross-cutting demographic-disparities/equity tag, orthogonal to the three layers.'
  code_discrepancies:
  - 'DOMAINS list (line 97): still includes "Gender, Race & Ethnicity" and "Poverty, Inequality & Living Standards".'
  - 'DOMAIN_LITERALS (line 233): same.'
  - 'DOMAIN_GUIDANCE (line 114): still includes entry 11 for "Gender, Race & Ethnicity" and entry 6 as "Poverty, Inequality
    & Living Standards".'
  - 'PURPOSES list (line 187): still includes "Inequality / Disparities Analysis".'
  - 'PURPOSE_LITERALS (line 257): same.'
  - 'PURPOSE_GUIDANCE (line 199): still includes "Inequality / Disparities Analysis" entry.'
  - 'CLASSIFICATION_EXAMPLES (line 499): Examples 6 and 7 reference removed categories.'
  - 'Cross-cutting tag: not yet implemented in code.'
  - 'PROMPT_VERSION (line 87): still "v3.3".'

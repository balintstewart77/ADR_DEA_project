- label: Demographic disparities / equity tag
  layer: Cross-cutting tag
  status: new v4
  include_in_prompt: true
  version_added: v3.4
  version_changed: null
  date_added: null
  date_changed: null
  definition: >-
    A cross-cutting tag for projects whose research question centres on comparing outcomes, experiences, risks, access, or trajectories across demographic or equality-relevant groups.
  inclusion_rules: >-
    Assign where comparison across groups is central to the research question, especially by sex, gender, race, ethnicity, religion, disability, age, cohort, migrant/refugee status, nationality, or other equality-relevant demographic characteristics. Socioeconomic comparison (e.g. by poverty, income, wealth) qualifies for this tag only when the comparison is made across a demographic group (such as age cohort, ethnicity, or sex); comparison by socioeconomic position alone does not. The tag can be combined with any Layer A domain and any Layer C purpose.
  exclusion_rules: >-
    Do not assign merely because demographic variables are used as controls, covariates, sample descriptors, or routine stratifiers. Do not assign to poverty, income, wealth, or deprivation projects where the comparison is purely by socioeconomic position without a demographic/equality-group dimension. Do not use this tag as a substitute for the substantive domain.
  examples:
  - text: >-
      Studies centrally comparing outcomes, risks, experiences, access, or trajectories across
      age, cohort, sex, gender, race, ethnicity, religion, disability, migrant/refugee status, or
      nationality groups.
    rationale: >-
      The tag is illustrated when comparison across these demographic or equality-relevant groups
      is part of the research question, not merely a control variable or sample descriptor. The
      substantive domain should still be recorded separately; the tag is not a substitute for the
      domain.
  - text: >-
      Studies examining inequalities in a substantive domain through one or more of the taxonomy's
      demographic or equality-relevant comparison dimensions.
    rationale: >-
      The tag captures the comparative lens across age, cohort, sex, gender, race, ethnicity,
      religion, disability, migrant/refugee status, or nationality, while the domain captures what
      outcome or system is being studied.
  counterexamples:
  - text: >-
      Studies of socioeconomic inequality, household debt, cost-of-living, deprivation, or
      regional disadvantage without comparison across a demographic or equality-relevant group.
    rationale: >-
      Socioeconomic or place-based inequality alone is not the demographic-disparities tag unless
      the comparison is across demographic or equality-relevant groups.
    instead_consider:
      - "Poverty, Wealth & Living Standards"

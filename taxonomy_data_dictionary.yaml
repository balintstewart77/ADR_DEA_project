  counterexamples:
    - project_id: "2021/150"
      title: "Intergenerational wealth transfers"
      replacement: "Poverty, Wealth & Living Standards"
    - project_id: "2020/034"
      title: "Pensions, Place, Populism: Do post-crisis wealth shocks matter?"

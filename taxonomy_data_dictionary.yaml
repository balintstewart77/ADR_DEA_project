    two health registries)." Decision rule: "If 2+ datasets all within the same policy domain -> Within-Domain Linkage." Count
    by policy domain, not provider: "large agencies like ONS supply datasets across many domains, so two ONS datasets from
    different policy areas still count as cross-domain."'

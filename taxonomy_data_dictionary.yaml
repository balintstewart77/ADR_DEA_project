- label: Unclear from Register Entry
  layer: Layer A -- domain
  status: active
  version_added: v3
  version_changed: v3.4
  date_added: '2026-03-26'
  date_changed: '2026-04-07'
  definition: |
    Use only where the project title and dataset field together do not provide enough evidence to assign any substantive domain. Renamed from "Unclear from Title" in v3.4 because classification draws on the dataset field as well as the title, so "from Title" misdescribed it.
  inclusion_rules: |
    Assign when the title is an opaque acronym, internal project name, or otherwise non-descriptive, and the dataset field does not resolve the substantive area.
  exclusion_rules: |
    Do not assign if the dataset field reveals a clear domain. Do not assign alongside a real domain. If any domain can be inferred with reasonable confidence, use that domain.
  examples:
    - description: "Opaque acronym or internal project name with non-informative datasets"
      assign: "Unclear from Register Entry"
      likely_co_labels:
      rationale: "Use only when neither title nor datasets allow a defensible domain assignment."
  counterexamples:
    - project_id: "2021/103"
      title: "AMPHoRA"
      replacement: "should not be Unclear from Register Entry if datasets reveal population/demography scope"
    - description: "`STRIDE`-style titles"
      replacement: "should not be Unclear from Register Entry where datasets reveal justice, employment, health, or another domain"
- label: Single-Dataset

  date_changed: 2026-04-23 (0a6798d, absorbed Multi-Domain Linkage -- now covers 2+ domains, previously exactly 2)
  project_count: 245 (v3.3 output)
  owner: '[AUTHOR TO CONFIRM]'
  definition: '[DRAFT] The project links datasets from two or more distinct policy domains, either through explicit record
    linkage or by using a pre-linked cross-domain product.'
  inclusion_rules: '(from prompt) "links datasets from two or more distinct policy domains (e.g. education data <-> employment
    data, or education + employment + health)." Decision rule: "If datasets span 2 or more distinct policy domains -> Cross-Domain
    Linkage." Pre-linked products (from prompt): "Some datasets are pre-linked products (e.g. ASHE linked to Census 2011).
    Treat the linkage implied by the component datasets, not the product name: ASHE linked to Census 2011 spans employment
    and demographics -> Cross-Domain Linkage."'
  exclusion_rules: '(from prompt) Pre-linked product within one domain stays within-domain: "COVID-19 Infection Survey linked
    to NHS Test and Trace stays within health -> still counts as a single health-domain product."'
  examples: '(from prompt) Example 3: "Impact of Universal Credit on employment outcomes" -- DWP welfare + ONS employment
    = 2 policy domains. Example 4: "Pathways from education through employment to health outcomes" -- education + employment
    + health = 3 domains. Examples 7, 8, 9, 10, 11 also demonstrate Cross-Domain.'
  counterexamples: '[AUTHOR TO WRITE]'

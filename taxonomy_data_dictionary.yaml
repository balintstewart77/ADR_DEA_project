      rationale: "Internal project naming may not reveal analytical purpose."
  counterexamples:
    - project_id: "2020/020"
      title: "Business dynamism"
      replacement: "Descriptive Monitoring"
    - project_id: "2020/024"
      title: "Assessing the impact of UK Enterprise Zones"
      replacement: "Policy Evaluation"
    - project_id: "2024/259"
      title: "Risk index of NEET for local authority use"
      replacement: "Risk Prediction"
- label: Demographic disparities / equity tag
  layer: Cross-cutting tag
  status: new v4
  version_added: v3.4
  version_changed: null
  date_added: null
  date_changed: null
  definition: |
    A cross-cutting tag for projects whose research question centres on comparing outcomes, experiences, risks, access, or trajectories across demographic or equality-relevant groups.
  inclusion_rules: |
    Assign where comparison across groups is central to the research question, especially by sex, gender, race, ethnicity, religion, disability, age, cohort, migrant/refugee status, nationality, or other equality-relevant demographic characteristics. Socioeconomic comparison (e.g. by poverty, income, wealth) qualifies for this tag only when the comparison is made across a demographic group (such as age cohort, ethnicity, or sex); comparison by socioeconomic position alone does not. The tag can be combined with any Layer A domain and any Layer C purpose.
  exclusion_rules: |
    Do not assign merely because demographic variables are used as controls, covariates, sample descriptors, or routine stratifiers. Do not assign to poverty, income, wealth, or deprivation projects where the comparison is purely by socioeconomic position without a demographic/equality-group dimension. Do not use this tag as a substitute for the substantive domain.
  examples:
    - project_id: "2021/005"
      title: "Occupational segregation by ethnicity..."
      assign: "Demographic disparities / equity tag"
      likely_co_labels:
        - "Labour Market & Employment"
        - "Descriptive Monitoring or Outcome Tracking"
      rationale: "Ethnicity is central to the labour-market comparison."
    - project_id: "2020/083"
      title: "Religion and Labour Market Outcomes in England and Wales: 1991-2011"
      assign: "Demographic disparities / equity tag"
      likely_co_labels:
        - "Labour Market & Employment"
        - "Outcome Tracking"
      rationale: "Religion is central to comparing labour-market outcomes."
    - project_id: "2022/190"
      title: "Ethnic inequalities in mortality"
      assign: "Demographic disparities / equity tag"
      likely_co_labels:
        - "Health & Social Care"
        - "Outcome Tracking or Descriptive Monitoring"
      rationale: "Ethnic comparison is central; mortality is the health outcome."
    - project_id: "2023/056"
      title: "Ethnic and religious inequalities in children's social services in Wales: Patterns and outcomes"
      assign: "Demographic disparities / equity tag"
      likely_co_labels:
        - "Health & Social Care"
        - "Service Interaction / Systems Analysis"
      rationale: "Ethnic/religious comparison is central; children's social services are the system."
    - project_id: "2021/050"
      title: "Cohort Comparisons of Wealth"
      assign: "Poverty, Wealth & Living Standards plus Demographic disparities / equity tag"
      likely_co_labels:
        - "Migration & Demographics"
        - "Descriptive Monitoring"
      rationale: "Age cohort is the demographic comparison; wealth is the substantive domain."
  counterexamples:
    - project_id: "2023/006"
      title: "Ethnic Minority British Election Study pilot"
      replacement: "Migration & Demographics unless the research question compares disparities"
    - project_id: "2020/017"
      title: "Subjective wellbeing impacts of debt and debt-related factors"
      replacement: "Poverty, Wealth & Living Standards / Outcome Tracking"

metadata:
  title: Taxonomy Data Dictionary -- DEA Project Classification Ontology v3.4
  generated: '2026-05-22'
  derivation: >-
    Classification ontology developed inductively from the UK Statistics Authority
    public register of DEA-accredited research projects. No single authoritative
    external taxonomy was identified that fits the scope of DEA-accredited research
    activity; the scheme was therefore derived bottom-up from the register and
    compared against ADR UK's research themes for interoperability rather than
    adopted from a standard. The taxonomy is designed for portfolio-level analysis of DEA-accredited
    research activity and is self-assessed against the ONS Taxonomy Best Practice
    Evaluation Framework (see METHODS_LOG.md).
  taxonomy_owner: Project Lead, DEA Dashboard
  layer_cardinality:
    Layer A -- domain: one or more
    Layer B -- linkage: exactly one
    Layer C -- purpose: one or two
    Cross-cutting tag: zero or more / boolean facets
  example_policy: >-
    Examples and counterexamples in this dictionary are authored rule illustrations,
    not validated project-level classifications. They clarify category meaning,
    inclusion rules, exclusion rules, and boundary cases. Real project examples,
    where used for review or validation, belong in separate candidate or validation
    artefacts rather than in the dictionary example schema.
  example_schema:
    rule_illustrations: >-
      Rule illustrations are authored category-level examples. They are true by
      construction for the category in which they appear and should not be read as
      validated classifications of DEA register projects.
    examples:
    - text: >-
        Short illustrative phrase, dataset configuration, study design, or boundary case.
      rationale: >-
        Why this illustrates the category.
    counterexamples:
    - text: >-
        Similar-looking case that should not trigger this category.
      rationale: >-
        Why it falls outside the boundary.
      instead_consider:
      - <valid category label>
    counterexample_note: >-
      Counterexamples may include instead_consider when an exact valid ontology label
      gives useful boundary guidance; omit the field where no such label is useful.
    prohibited_fields: >-
      Dictionary rule illustrations do not carry project IDs, evidence fields,
      source dataset fields, confidence fields, uncertainty fields, validation status,
      or review cautions.
  category_identity_note: >-
      Category identity is defined by the combination of layer and label, not by label
      alone. The fallback label "Unclear from Register Entry" appears separately in
      Layer A, Layer B, and Layer C, and these are distinct categories.
  governance:
    taxonomy_owner: Project Lead, DEA Dashboard
    review_process: >-
      Proposed changes to labels, definitions, inclusion rules, exclusion rules, or examples
      must be recorded in the methods log and reviewed before implementation in the classifier
      prompt or dashboard.
    change_approval: >-
      Structural changes, including added, removed, merged, split, or relabelled categories,
      require explicit author approval before use in a classification run.
    validation_protocol: >-
      Major ontology revisions must be followed by a validation pass using a stratified sample
      that oversamples known boundary cases and historically unstable categories.
    feedback_route: >-
      Feedback is collected through the DEA Dashboard project feedback route and reviewed as
      part of the taxonomy revision cycle.
    next_review_trigger: >-
      Review after first round of external feedback, v4 validation, after substantial changes to the DEA register, or when repeated
      validation errors indicate a category boundary problem.
  notes:
  - This file is the single source of truth. CSV or Markdown renderings are generated from it (for ease of machine/human readibility).
  balance_note: >-
    Balance: the categories vary considerably in size. Some Layer C purposes — notably Risk Prediction / Early Identification and Service Interaction / Systems Analysis — are small. 
    They are retained as genuine, conceptually distinct analytical purposes and on future-proofing grounds (these kinds of research are expected to become more common). No claim is 
    made about trends over time in these small categories: at their current size, year-on-year variation is not statistically meaningful and should not be read as a trend.
  covid_category_type_note: >-
    COVID-19 & Pandemic is retained as a Layer A domain but is a category-type anomaly: unlike the other domains, which are policy/sector areas, it is a time-bounded event that cuts across domains 
    (its own inclusion rule directs that it be assigned alongside a substantive domain). This is the same category-type issue that led to the removal of "Gender, Race & Ethnicity" from Layer A. 
    Whether COVID-19 should likewise be converted from a domain to a cross-cutting tag is a documented open question, to be decided after v4 validation; it is not changed in v3.4.
  adr_uk_theme_alignment:
    description: >-
      Mapping of this dictionary's Layer A domains to ADR UK's seven research themes, for interoperability reference under the ONS framework's interoperability principle. This alignment is a 
      comparison, not an adoption: the dictionary's domains were derived inductively from the DEA register and diverge from ADR UK's themes where the register's scope is broader.
    source: ADR UK website research themes page
    accessed: '2026-05-22'
    adr_uk_themes:
    - Housing & communities
    - Health & wellbeing
    - Children, young people & education
    - Employment & the economy
    - Climate & the environment
    - Social mobility & inclusion
    - Crime & justice
    mapping:
      Labour Market & Employment:
        adr_uk_theme: Employment & the economy
        alignment_type: close
        note: Covers labour-market research; ADR UK theme also includes wider economic activity.
      Education & Skills:
        adr_uk_theme: Children, young people & education
        alignment_type: close
        note: Close match for education and skills research, although this ontology also includes adult skills and workforce training.
      Health & Social Care:
        adr_uk_theme: Health & wellbeing
        alignment_type: close
        note: Close match, with this ontology using a more service-facing health and social care label.
      Crime & Justice:
        adr_uk_theme: Crime & justice
        alignment_type: close
        note: Direct match.
      Business & Productivity:
        adr_uk_theme: Employment & the economy
        alignment_type: partial
        note: ADR UK combines employment and economy; this ontology separates firm/productivity research from labour-market research because the DEA register contains substantial business-data use.
      Poverty, Wealth & Living Standards:
        adr_uk_theme: Social mobility & inclusion
        alignment_type: partial
        note: Partial overlap only. ADR UK's theme is broader, covering social mobility and inclusion; this ontology narrows the domain to material resources, poverty, wealth, benefits, debt, 
          and living standards.
      Housing & Planning:
        adr_uk_theme: Housing & communities
        alignment_type: close
        note: Close match, though this ontology foregrounds housing, planning and residential conditions.
      Migration & Demographics:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. ADR UK's seven themes do not include a dedicated migration/demography theme. Population structure, migration, fertility and mortality (ONS provides access to mortality 
          data) are a substantial strain of research in the DEA register, the absence of an ADR UK match relects the broader scope of this register-derived scheme rather than a weaker claim to domain status.
      Environment & Agriculture:
        adr_uk_theme: Climate & the environment
        alignment_type: partial
        note: Partial overlap. ADR UK's theme emphasises climate and environment; this ontology also includes agriculture, land use and farming because these appear in projects in the DEA register.
      Public Finance & Taxation:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. Public finance and taxation are retained because the DEA register includes a lot of fiscal, tax and public-expenditure research.
      COVID-19 & Pandemic:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. COVID-19 is a time-bounded cross-domain event rather than a standing ADR UK research theme.
      Data Infrastructure & Methodology:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. Methodological and data-infrastructure research is retained as a domain because it is visible in the DEA register.
categories:
- label: Labour Market & Employment
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning work, employment, labour-market participation, and workforce dynamics. Includes wages and earnings; employment, unemployment, inactivity and underemployment; job quality, 
    working hours, contracts and working conditions; labour supply and demand; occupational, sectoral and geographic mobility; workforce recruitment and retention; skills demand and mismatch; and 
    transitions into, through, or out of work.
  inclusion_rules: >-
    Assign when work, employment, earnings, labour supply or demand, workforce composition, job quality, occupational structure, or labour-market transitions are central to the project.
  exclusion_rules: >-
    Do not assign solely because a project mentions income, education, productivity, health, migration, or workers. Use **Education & Skills** for education systems and qualifications unless 
    labour-market outcomes are central. Use **Poverty, Wealth & Living Standards** for household resources, poverty, wealth, debt, or living standards unless employment/earnings are the main object.
  examples:
  - text: >-
      Studies that use education, migration, disability, or other group characteristics to examine
      employment, earnings, job quality, or workforce progression.
    rationale: >-
      The category boundary is set by the outcome being studied. A subgroup can define the
      population, but the domain is labour-market research when work or earnings are the central
      object. If education, migration, disability, or another characteristic also matters, that
      should be treated as possible co-domain or tag context rather than as the reason for this
      labour-market illustration.
  counterexamples:
  - text: >-
      Studies whose object is household resources, saving, debt, wealth, or living standards, even
      where earnings or employment data provide context.
    rationale: >-
      Labour-market data can be supporting evidence without making employment the substantive
      domain. The boundary turns on whether work and workforce dynamics are the research object. A
      project may still have a labour-market co-domain if employment mechanisms are substantively
      analysed, but supporting earnings data alone are not enough.
    instead_consider:
      - "Poverty, Wealth & Living Standards"
- label: Education & Skills
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning education, learning, training, skills formation, and transitions through education systems. Includes early years, schools, colleges, universities, qualifications, apprenticeships, admissions, attainment, attendance, teacher workforce issues, childcare, and education-to-work pathways.
  inclusion_rules: >-
    Assign when the project's substantive focus is educational participation, attainment, qualifications, admissions, skills acquisition, apprenticeship pathways, school absence, teacher supply, or educational progression.
  exclusion_rules: >-
    Do not assign merely because a project uses education data if the research question is mainly about employment, health, crime, poverty, or demography. Add **Labour Market & Employment** where the project studies employment or earnings outcomes after education.
  examples:
  - text: >-
      Studies whose object is educational participation, admissions, attainment, qualifications,
      learner progression, or movement through education systems.
    rationale: >-
      These cases illustrate the category because the education system or learning pathway is the
      substantive setting and outcome space.
  - text: >-
      Studies whose object is skills formation, training provision, apprenticeship pathways, or
      the relationship between education routes and later progression.
    rationale: >-
      The category applies to the training or skills system itself, even where later labour-market
      outcomes are part of the evidence base. If the same research also evaluates a named levy or
      programme, that affects the analytical purpose rather than displacing the education and
      skills domain.
  counterexamples:
  - text: >-
      Studies of wages or employment progression where education level is only a worker
      characteristic or subgroup definition.
    rationale: >-
      Educational attainment can describe a population without making the education system the
      object of study. This can become a dual-domain case only where the education-to-work pathway
      itself is part of the research object.
    instead_consider:
      - "Labour Market & Employment"
- label: Health & Social Care
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning health, illness, mortality, wellbeing, clinical outcomes, health services, public health, mental health, social care, and care-system use. Includes NHS services, hospitals, GP care, palliative care, maternity, morbidity, mortality where health is the research object, and adult or children's social care.
  inclusion_rules: >-
    Assign when the project studies health outcomes, healthcare access, mental health, mortality as a health outcome, social care, care pathways, service utilisation, clinical risk, morbidity, or wellbeing with a health focus.
  exclusion_rules: >-
    Do not assign mortality projects automatically. Use **Migration & Demographics** for mortality as a demographic/population outcome. Use **Service Interaction / Systems Analysis** as the purpose where the focus is pathways through services rather than health outcomes.
  examples:
  - text: >-
      Studies whose object is health status, illness, clinical outcomes, hospital use, care needs,
      or social-care outcomes.
    rationale: >-
      The category is illustrated when the research question is about health or care outcomes,
      even if social, housing, or demographic factors are analysed as exposures.
  - text: >-
      Studies linking education, demographic, or administrative records to understand mental
      health, physical health, care pathways, or service use.
    rationale: >-
      Cross-domain data do not change the substantive domain when the outcome being explained is
      health or care. The illustration should not imply that a cross-domain education-health
      product has only a health domain; it illustrates this domain only where health or care is
      the research object.
  counterexamples:
  - text: >-
      Studies using mortality as a population-composition or migration-comparison measure rather
      than as a clinical, care, or public-health outcome.
    rationale: >-
      Mortality evidence can support demographic research. The health domain boundary depends on
      whether illness, care, or health outcomes are the object of analysis. A full proposal could
      still reveal a health-outcomes framing, so this is a boundary pattern rather than a
      project-level classification.
    instead_consider:
      - "Migration & Demographics"
- label: Crime & Justice
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning crime, victimisation, public safety, offending, policing, courts, prisons, probation, sentencing, family justice, civil justice, reoffending, and criminal records.
  inclusion_rules: >-
    Assign when the project's substantive focus is offending, victimisation, domestic abuse, policing, courts, sentencing, imprisonment, probation, youth justice, family justice, civil justice, or justice-system outcomes.
  exclusion_rules: >-
    Do not assign merely because a project studies "risk", "fairness", "violence", or "families" unless the justice system, criminal behaviour, legal proceedings, or victimisation are central.
  examples:
  - text: >-
      Studies following defendants, cases, victims, or offenders through justice processes and
      outcomes.
    rationale: >-
      The category is illustrated by the legal or justice-system pathway being studied, not simply
      by the use of administrative data. The same evidence may also illustrate service-system
      analysis or within-domain linkage, but those are separate layer decisions.
  counterexamples:
  - text: >-
      Studies about harm, vulnerability, substance misuse, or high-risk groups where the outcome
      is health, wellbeing, or support need rather than crime or justice-system involvement.
    rationale: >-
      Harm or risk language can resemble public-safety research, but the Crime & Justice domain
      requires criminal behaviour, victimisation, legal proceedings, or justice-system outcomes to
      be central.
    instead_consider:
      - "Health & Social Care"
- label: Business & Productivity
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning firms, business activity, industrial structure, innovation, productivity, entrepreneurship, trade, exports, foreign direct investment, research and development, business support, and firm-level performance.
  inclusion_rules: >-
    Assign when the project studies firms, business behaviour, productivity, innovation, investment, exporting, enterprise support, start-ups, industrial policy, business surveys, or firm-level outcomes.
  exclusion_rules: >-
    Do not assign simply because a project uses firm-level data if the substantive question is mainly about workers, wages, public finance, or environmental impacts. Add **Labour Market & Employment** where jobs, wages, workforce composition, or employment outcomes are central.
  examples:
  - text: >-
      Studies evaluating how programmes, policies, or economic conditions affect enterprise
      growth, firm performance, investment, or exporting.
    rationale: >-
      The policy or programme may define the analytical design, but the domain is business
      research when firm-level outcomes are central. A programme-evaluation design affects the
      purpose layer; it does not change the domain when firm outcomes are central.
  counterexamples:
  - text: >-
      Studies of worker skills, occupational roles, or training needs where firms are not the main
      object of analysis.
    rationale: >-
      Skills or workforce data can be relevant to business research, but this domain requires firm
      behaviour, productivity, or business performance to be central. Employer-training content
      may make a case business-relevant, but the domain should not switch unless firm behaviour or
      performance is central.
    instead_consider:
      - "Education & Skills"
      - "Labour Market & Employment"
- label: Poverty, Wealth & Living Standards
  layer: Layer A -- domain
  status: relabelled v3.4
  include_in_prompt: true
  version_added: v3
  version_changed: v3.4
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning material resources, economic hardship, household living standards, poverty, wealth, debt, savings, benefits, deprivation, food security, cost of living, household income, and distribution of resources.
  inclusion_rules: >-
    Assign when the project's substantive focus is poverty, household income, wealth, savings, debt, benefits, deprivation, food insecurity, living standards, economic hardship, or household resources.
  exclusion_rules: >-
    Do not assign solely because a title mentions pay gaps, employment, or socioeconomic differences. Use **Labour Market & Employment** for wages, pay, earnings, job status, and occupational outcomes unless household resources or poverty are central. Comparison of material conditions (poverty, income, wealth) across demographic groups (e.g. by age cohort, ethnicity, or sex) qualifies for the **Demographic disparities / equity tag** in addition to this domain.
  examples:
  - text: >-
      Studies examining austerity, cost-of-living pressures, low-income household debt, or
      resource constraints as lived material conditions.
    rationale: >-
      The boundary is material hardship and household economic position, even when labour-market
      or price data are used as inputs. Labour-market datasets can support this research without
      making work or employment the main domain.
  counterexamples:
  - text: >-
      Studies whose object is pay, earnings gaps, or labour-market inequality rather than
      household resources or material living standards.
    rationale: >-
      Pay inequality can affect living standards, but the domain boundary should follow the
      central object of study. A demographic-disparities tag may still be relevant where the pay
      comparison is centrally across equality-relevant groups.
    instead_consider:
      - "Labour Market & Employment"
- label: Housing & Planning
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning housing, homelessness, residential conditions, tenure, home ownership, planning systems, neighbourhoods, gentrification, residential mobility, and place-based housing or planning interventions.
  inclusion_rules: >-
    Assign when housing, homelessness, residential tenure, home ownership, housing markets, planning decisions, neighbourhood conditions, or residential mobility are central to the research question.
  exclusion_rules: >-
    Do not assign merely because a project mentions "home", "place", "local area", or "stay at home" unless housing, residential conditions, or planning are substantive objects. Use **Environment & Agriculture** where domestic energy consumption or environmental exposure is central.
  examples:
  - text: >-
      Studies treating the dwelling or residential environment as the mechanism linking housing
      conditions to health, energy use, or place-based outcomes.
    rationale: >-
      The housing domain applies when the condition or use of homes is central, even if the
      measured outcome sits in another domain. If environmental exposure or energy systems are the
      main object, the Environment & Agriculture domain may be the stronger fit.
  counterexamples:
  - text: >-
      Studies where home is only the location of pandemic behaviour, remote activity, or
      public-health guidance.
    rationale: >-
      The word home should not trigger this domain unless housing quality, tenure, residential
      conditions, or planning are the research object.
    instead_consider:
      - "COVID-19 & Pandemic"
- label: Migration & Demographics
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning population structure, population change, migration, immigration, population mobility, fertility, ageing, mortality as a demographic outcome, census-based population analysis, and demographic composition.
  inclusion_rules: >-
    Assign when the project studies migration flows, immigration policy, population movement, demographic change, fertility, ageing, census populations, population projections, or mortality as part of demographic structure.
  exclusion_rules: >-
    Do not assign solely because a project includes ethnicity, age, or migrant status as a subgroup. Use **Labour Market & Employment** for migrant employment or earnings if labour-market outcomes are central. Use **Health & Social Care** for mortality or morbidity where the research question is health-focused.
  examples:
  - text: >-
      Studies whose object is migration flows, migrant integration, immigration policy, population
      movement, or differences between migrant and non-migrant populations.
    rationale: >-
      These cases concern population movement and demographic composition, which are the core
      objects of the domain. If labour-market outcomes are central, this may become a co-domain
      rather than replacing the demographic domain.
  - text: >-
      Studies whose object is population structure or change, including mobility, fertility,
      ageing, mortality as a demographic outcome, or cohort composition.
    rationale: >-
      The category is illustrated when the research asks about how populations are composed or
      change over time.
  counterexamples:
  - text: >-
      Studies comparing outcomes by ethnicity, nationality, or other demographic characteristics
      within a labour, justice, health, or education question.
    rationale: >-
      Demographic subgroup comparison is not the same as studying population structure, migration,
      or demographic change. The demographic-disparities/equity tag may still apply where the
      group comparison is central.
    instead_consider:
      - "Crime & Justice"
      - "Labour Market & Employment"
- label: Environment & Agriculture
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning the natural environment, climate, energy, agriculture, farming, land use, pollution, decarbonisation, environmental policy, domestic or industrial energy use, and environmental impacts of economic or social activity.
  inclusion_rules: >-
    Assign when the project studies energy consumption, climate policy, decarbonisation, agriculture, farms, land use, environmental exposure, pollution, green transitions, or environmental dimensions of households, firms, or places.
  exclusion_rules: >-
    Do not assign because the word "environment" appears in a non-natural-environment sense, such as "economic environment". Use **Business & Productivity** where an energy or climate programme is primarily framed as firm innovation or productivity, but add Environment where environmental outcomes are central.
  examples:
  - text: >-
      Studies whose object is energy consumption, climate policy, decarbonisation, environmental
      exposure, pollution, or environmental impacts.
    rationale: >-
      These cases concern the natural environment, climate, or energy systems rather than a
      generic social or economic context. Residential energy cases may also involve housing, but
      this domain is illustrated when energy or environmental mechanisms are central.
  - text: >-
      Studies whose object is farming, farm households, agricultural production, land use, or
      agricultural administrative data.
    rationale: >-
      Agriculture and land-use research belongs in this domain because farming or environmental
      resource use is the substantive object.
  counterexamples:
  - text: >-
      Studies using environment to mean a social, economic, family, or institutional context
      rather than the natural environment.
    rationale: >-
      The category excludes non-natural-environment uses of environment unless climate, energy,
      land, pollution, agriculture, or ecological exposure is central.
    instead_consider:
      - "Poverty, Wealth & Living Standards"
      - "Education & Skills"
- label: Public Finance & Taxation
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research concerning government revenue, taxation, tax compliance, tax credits, public expenditure, public spending, fiscal transfers, business rates, tax reliefs, and fiscal policy.
  inclusion_rules: >-
    Assign when the project studies tax policy, tax behaviour, tax compliance, government expenditure, public spending, fiscal transfers, tax credits, business rates, or distributional impacts of fiscal policy.
  exclusion_rules: >-
    Do not assign to private wealth transfers, household wealth, firm investment, or business outcomes unless the public finance/tax mechanism is central. Use **Business & Productivity** for firm outcomes of business-support schemes unless fiscal design or tax/public spending is the main object.
  examples:
  - text: >-
      Studies evaluating how a tax, contribution, relief, levy, subsidy, or rates scheme affects
      households, firms, or places.
    rationale: >-
      The fiscal design is the central mechanism, even where the measured outcomes are employment,
      business, or household outcomes. Multi-domain outcomes do not displace this domain where the
      fiscal mechanism is the object of study.
  counterexamples:
  - text: >-
      Studies of private debt, saving, wealth, or household finances without a tax, benefit,
      spending, or fiscal-policy mechanism.
    rationale: >-
      Household financial circumstances are not public finance unless a public revenue or
      expenditure mechanism is central.
    instead_consider:
      - "Poverty, Wealth & Living Standards"
- label: COVID-19 & Pandemic
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research specifically focused on COVID-19, the COVID-19 pandemic, pandemic control measures, vaccination, infection surveillance, lockdowns, social distancing, pandemic-related public support, or pandemic consequences.
  inclusion_rules: >-
    Assign whenever COVID-19 or pandemic conditions are central to the research question. If the project studies COVID-19 effects on employment, business, health, education, inequality, or households, assign both COVID-19 & Pandemic and the relevant substantive domain.
  exclusion_rules: >-
    Do not assign simply because the project occurred during the pandemic period. Do not assign to infectious disease, health, or mortality studies unless COVID-19/pandemic framing is explicit.
  category_type_note: >-
    See metadata covid_category_type_note. COVID-19 & Pandemic is a category-type anomaly: it is a time-bounded event rather than a policy/sector area. Whether it should be converted from a domain to a cross-cutting tag (as was done with Gender, Race & Ethnicity) is an open question for post-v4 validation.
  examples:
  - text: >-
      Studies where pandemic infection, surveillance, vaccination, containment, or control
      processes are the substantive research object.
    rationale: >-
      This illustrates the event-domain because COVID-19 is the surveillance object or
      intervention context being studied, not merely the period in which data were collected.
      Because this is an event-domain, a substantive co-domain may also be needed where the
      pandemic is studied through health, labour, business, education, or household outcomes.
  - text: >-
      Studies examining how pandemic conditions affected health, work, business, education,
      inequalities, households, or public services.
    rationale: >-
      This remains in scope where the pandemic is the substantive exposure, context, or outcome
      frame. The key boundary is that pandemic conditions structure the research question; the
      substantive co-domain should be reviewed separately.
  counterexamples:
  - text: >-
      Studies where COVID-19 is only a date range, background period, excluded cause, or
      incidental context for otherwise non-pandemic research.
    rationale: >-
      This falls outside the event-domain when COVID-19 is not the exposure, surveillance object,
      intervention context, substantive outcome frame, or central pandemic condition being
      studied.
    instead_consider:
      - "Health & Social Care"
      - "Migration & Demographics"
- label: Data Infrastructure & Methodology
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research primarily focused on the methods, measures, tools, classifications, linkage processes, data quality, survey design, statistical infrastructure, or dataset development needed to produce, improve, validate, or use research data. Distinction from Layer C **Methodological / Infrastructure Research**: this Layer A domain applies when data, methods, or statistical infrastructure are the substantive object of the research -- what the project is about. The Layer C purpose applies when the analytical purpose is methodological or infrastructural -- what the project is doing. The two layers answer different questions, so a methods-focused project may legitimately carry both by design.
  inclusion_rules: >-
    Assign when the primary contribution is methodological or infrastructural: record linkage methods, survey methodology, data quality, measurement frameworks, classification systems, statistical estimation, dataset construction, validation studies, or improving indicators.
  exclusion_rules: >-
    Do not assign merely because a project uses administrative data, linkage, machine learning, or statistical methods. If the method is instrumental to a substantive question, classify by the substantive domain and analytical purpose instead.
  examples:
  - text: >-
      Studies whose object is the quality, construction, classification, measurement, linkage, or
      improvement of data assets or statistical infrastructure.
    rationale: >-
      This domain applies when data infrastructure itself is the substantive topic rather than
      just the means of studying another domain. A substantive application area may still be
      present, but this domain is illustrated only when the method or data asset is the main
      object.
  - text: >-
      Studies developing, testing, or demonstrating a dataset, indicator framework,
      classification, survey method, or measurement approach.
    rationale: >-
      The category is illustrated by research focused on how data or methods are built and made
      usable. This is the domain counterpart of the Layer C methodological purpose; the domain is
      appropriate where data infrastructure is the subject matter.
  counterexamples:
  - text: >-
      Studies in a substantive domain that use linked data, administrative records, or advanced
      methods only as tools for the main research question.
    rationale: >-
      Methodological sophistication does not make this the domain unless data or methods are the
      research object.
    instead_consider:
      - "Health & Social Care"
      - "Labour Market & Employment"
      - "Business & Productivity"
      - "Crime & Justice"
- label: Unclear from Register Entry
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: v3.4
  date_added: '2026-03-26'
  date_changed: '2026-04-07'
  definition: >-
    Use only where the project title and dataset field together do not provide enough evidence to assign any substantive domain. Renamed from "Unclear from Title" in v3.4 because classification draws on the dataset field as well as the title, so "from Title" misdescribed it.
  inclusion_rules: >-
    Assign when the title is an opaque acronym, internal project name, or otherwise non-descriptive, and the dataset field does not resolve the substantive area.
  exclusion_rules: >-
    Do not assign if the dataset field reveals a clear domain. Do not assign alongside a real domain. If any domain can be inferred with reasonable confidence, use that domain.
  examples:
  - text: >-
      Register entries where the title is a broad programme name or acronym and the dataset field
      is missing or uninformative.
    rationale: >-
      This illustrates uncertainty because neither available register field supports a defensible
      substantive domain. "Unclear from Register Entry" covers cases where the available
      register text genuinely does not determine the category — this includes both genuinely
      ambiguous research and register entries too sparse or damaged to interpret; it is a
      statement about the register entry, not a judgement that the research is itself
      unclassifiable.
  - text: >-
      Register entries using broad public-value language with only generic dataset information and
      no identifiable policy or sector object.
    rationale: >-
      The category is a fallback for insufficient evidence, not a substantive domain in its own
      right.
  counterexamples:
  - text: >-
      Acronym-bearing or branded entries where the surrounding wording still identifies a justice,
      health, education, labour, or other substantive object.
    rationale: >-
      An opaque project name is not enough for this fallback label when other register text
      resolves the domain. A service-system purpose can be considered separately, but the domain
      should follow the substantive object visible in the register text.
    instead_consider:
      - "Crime & Justice"
- label: Single-Dataset
  layer: Layer B -- linkage
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    The project uses one dataset or one internally coherent dataset product from a single policy domain, with no cross-dataset or cross-domain linkage implied by the register entry.
  inclusion_rules: >-
    Assign where exactly one dataset is listed and it does not itself represent a cross-domain pre-linked product.
  exclusion_rules: >-
    Do not assign to pre-linked products that combine domains, such as education-health or employment-census products. Do not assign where multiple datasets are listed, even if from the same provider.
  examples:
  - text: >-
      A register entry listing one standalone data source from one provider, with no evidence of
      linkage or multi-source construction.
    rationale: >-
      This illustrates the linkage mode because the dataset field supports one coherent source
      rather than multiple datasets or a pre-linked product.
  - text: >-
      A register entry listing one internally coherent survey or data product where component
      sources are not separately identified.
    rationale: >-
      The non-obvious boundary is that a single named data product can remain Single-Dataset when
      it is not described as a linked cross-source product.
  counterexamples:
  - text: >-
      A single listed product or named pair whose component sources are known to combine domains,
      such as education-health or census-earnings linkage.
    rationale: >-
      The register may show one product name, but linkage mode depends on the component sources
      when a product is pre-linked.
    instead_consider:
      - "Cross-Domain Linkage"
- label: Within-Domain Linkage
  layer: Layer B -- linkage
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    The project uses or links two or more datasets that all fall within the same policy domain.
  inclusion_rules: >-
    Assign where multiple datasets are listed but they belong to the same substantive policy domain, regardless of whether they come from the same provider.
  exclusion_rules: >-
    Do not assign merely because datasets share a provider. Large providers such as ONS supply datasets across multiple policy domains, so provider identity is not sufficient. If datasets span two or more policy domains, assign Cross-Domain Linkage.
  examples:
  - text: >-
      A register entry listing multiple datasets that all remain within one substantive policy
      domain, such as several business surveys.
    rationale: >-
      The number of datasets is greater than one, but the linkage does not cross a domain
      boundary.
  - text: >-
      A register entry combining multiple court, prison, probation, or family-justice datasets
      within the justice system.
    rationale: >-
      This illustrates within-domain linkage because the datasets vary by source or service
      component but remain in one policy domain.
  counterexamples:
  - text: >-
      A dataset configuration combining education records with criminal-justice data, or welfare
      records with labour-market data.
    rationale: >-
      Once component sources span substantive domains, the linkage mode is cross-domain rather
      than within-domain.
    instead_consider:
      - "Cross-Domain Linkage"
- label: Cross-Domain Linkage
  layer: Layer B -- linkage
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: v3.3
  date_added: '2026-03-26'
  date_changed: '2026-04-23'
  definition: >-
    The project links, combines, or uses datasets spanning two or more distinct policy domains, including cases where the register lists a single pre-linked product whose component sources are cross-domain.
  inclusion_rules: >-
    Assign where datasets span at least two policy domains, such as education plus employment, welfare plus labour market, health plus housing, justice plus employment, or agriculture plus individuals/households. Treat pre-linked products according to their component domains, not simply the number of names listed.
  exclusion_rules: >-
    Do not assign where multiple datasets all remain within one policy domain. Do not assign to a single-domain pre-linked product such as COVID-19 infection data linked to test-and-trace data if both remain within health.
  examples:
  - text: >-
      A pre-linked product whose component sources span education and health or social care, even
      if the register lists the product under one name.
    rationale: >-
      The linkage mode follows the component sources. A single product name can still represent
      cross-domain linkage. A pre-linked product may also have a strong substantive domain, but
      this illustration concerns linkage mode only.
  - text: >-
      A register entry listing datasets from two or more substantive domains, such as education
      plus justice or census plus earnings.
    rationale: >-
      This illustrates cross-domain linkage because the research combines data whose source
      domains are substantively distinct.
  counterexamples:
  - text: >-
      A register entry listing several datasets that all sit within the same justice, business,
      health, or education domain.
    rationale: >-
      Multiple datasets do not imply cross-domain linkage unless their component sources cross a
      substantive policy-domain boundary.
    instead_consider:
      - "Within-Domain Linkage"
- label: Unclear from Register Entry
  layer: Layer B -- linkage
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: v3.4
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Use only where the dataset field is missing, malformed, or too ambiguous to determine linkage mode. Renamed from "Unclear from Title" in v3.4 because classification draws on the dataset field as well as the title, so "from Title" misdescribed it.
  inclusion_rules: >-
    Assign when the number or domain of datasets cannot be inferred from the register entry.
  exclusion_rules: >-
    Do not assign based on an unclear title alone. Linkage mode should be determined primarily from the dataset field.
  examples:
  - text: >-
      A register entry with a missing or blank dataset field, so the number and domain of datasets
      cannot be inferred.
    rationale: >-
      Linkage mode is determined primarily from the dataset field; absent dataset evidence
      prevents a defensible mode assignment. "Unclear from Register Entry" covers cases where
      the available register text genuinely does not determine the category — this includes both
      genuinely ambiguous research and register entries too sparse or damaged to interpret; it is
      a statement about the register entry, not a judgement that the research is itself
      unclassifiable.
  - text: >-
      A register entry whose dataset field includes unknown or unspecified sources alongside
      heterogeneous assets, making the complete linkage structure unclear.
    rationale: >-
      The known sources may suggest a mode, but an unspecified component can make the overall
      configuration unreliable without review.
  counterexamples:
  - text: >-
      A vague title paired with a dataset field that clearly lists one standalone data source.
    rationale: >-
      Unclear title wording alone should not make linkage unclear when the dataset field resolves
      the mode.
    instead_consider:
      - "Single-Dataset"
- label: Descriptive Monitoring
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research whose analytical purpose is to measure and characterise a phenomenon -- its level, prevalence, distribution, composition, profile, trend, or pattern -- including how it varies across places, populations, or time, without primarily testing an exposure-outcome relationship or evaluating a named intervention.
  inclusion_rules: >-
    Assign where the project asks "how much?", "what pattern?", "which groups?", "where?", or "how is this changing over time?" without a causal or intervention-evaluation framing.
  exclusion_rules: >-
    Do not assign where the project primarily tests whether X leads to Y. Use **Outcome Tracking** for exposure-outcome designs and **Policy Evaluation / Impact Analysis** for named policies, programmes, or interventions.
  examples: []
  counterexamples:
  - text: >-
      Studies designed to estimate whether a condition, exposure, or characteristic is associated
      with a downstream outcome.
    rationale: >-
      That design goes beyond description because it links X to Y.
    instead_consider:
      - "Outcome Tracking"
- label: Outcome Tracking
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: '2026-04-07'
  definition: >-
    Research that links a naturally occurring exposure, condition, event, status, characteristic, or circumstance to a downstream outcome.
  inclusion_rules: >-
    Assign where the project asks whether or how X is associated with, predicts, or leads to Y, and X is not a deliberate named policy or intervention. Covers health outcomes, employment outcomes, firm outcomes, educational outcomes, criminal justice outcomes, wellbeing outcomes, and similar exposure-outcome designs.
  exclusion_rules: >-
    Use **Policy Evaluation / Impact Analysis** if X is a named policy, programme, or intervention. Use **Descriptive Monitoring** if the project only measures patterns or trends. Use **Life-Course / Trajectory Analysis** where the main focus is extended movement across life stages rather than one exposure-outcome link.
  examples:
  - text: >-
      Studies examining determinants, consequences, or relationships between social, health,
      economic, educational, business, or justice phenomena.
    rationale: >-
      The analytical operation is tracing an exposure-outcome relationship rather than simply
      profiling a phenomenon.
  counterexamples:
  - text: >-
      Studies estimating the effect of a named policy, programme, scheme, fund, levy, reform, or
      intervention.
    rationale: >-
      When the exposure is a deliberate intervention, the design belongs to policy evaluation
      rather than generic outcome tracking. The named-intervention boundary itself has genuine
      hard cases: studies of broad statutory parameters such as minimum-wage levels, tax
      thresholds, or benefit rates can be framed either as evaluating a named policy or as
      analysing a naturally occurring change, and such cases require the author's judgement about
      how the project frames the exposure.
    instead_consider:
      - "Policy Evaluation / Impact Analysis"
- label: Life-Course / Trajectory Analysis
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research that follows individuals, cohorts, households, firms, or cases across extended time periods, transitions, or life stages to understand trajectories, progression, mobility, or cumulative outcomes.
  inclusion_rules: >-
    Assign where the project tracks movement over time: childhood to adulthood, education to work, offending careers, family trajectories, employment trajectories, intergenerational mobility, social mobility, health trajectories, or long-run outcomes. Disambiguation guide: where the pathway is movement through public-service or institutional systems (courts, family justice, support services, emergency departments, referrals, or case processing), **Service Interaction / Systems Analysis** is the primary reading. Life-Course / Trajectory Analysis may additionally apply where extended progression across life stages or long time periods is also central; Layer C permits more than one purpose.
  exclusion_rules: >-
    Do not assign merely because longitudinal data are used. If the study is a single exposure-outcome test, use Outcome Tracking. If it evaluates a named intervention over time, use Policy Evaluation.
  examples:
  - text: >-
      Studies following individuals, households, firms, or cases through stages, transitions,
      pathways, or trajectories over an extended period.
    rationale: >-
      This purpose is illustrated by movement and progression across time, not just the presence
      of longitudinal data.
  - text: >-
      Studies examining educational, family, service, health, work, or justice pathways as
      sequences of states or transitions.
    rationale: >-
      The analytical object is the trajectory itself, including how people or cases move between
      stages. Where the pathway is specifically through public services, Service Interaction /
      Systems Analysis may also be relevant.
  counterexamples:
  - text: >-
      Studies using longitudinal data to estimate one exposure-outcome relationship without
      analysing extended progression or sequence.
    rationale: >-
      Longitudinal data are not sufficient; the purpose depends on whether trajectories or
      life-stage movement are central.
    instead_consider:
      - "Outcome Tracking"
- label: Service Interaction / Systems Analysis
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research focused on how people, cases, families, or organisations move through, use, access, or are processed by public service systems.
  inclusion_rules: >-
    Assign where the core object is service pathways, service uptake, referral patterns, help-seeking, case progression, system interaction, institutional processing, or cross-service movement. Disambiguation guide: pathways through public-service or institutional systems (courts, family justice, support services, emergency departments, referrals, or case processing) are the primary reading for this category. **Life-Course / Trajectory Analysis** may additionally apply where extended progression across life stages or long time periods is also central; Layer C permits more than one purpose.
  exclusion_rules: >-
    Do not assign merely because an outcome occurs in a public service context. If the service is only the setting and the focus is an individual outcome, use Outcome Tracking. If evaluating a named service reform or intervention, use Policy Evaluation.
  examples:
  - text: >-
      Studies of service uptake, high-intensity use, support pathways, referrals, case
      progression, or cross-service movement.
    rationale: >-
      The analytical operation concerns interaction with systems, rather than only the outcome
      experienced by an individual. Health or education outcomes can be present, but this purpose
      is strongest when utilisation or pathway through services is central.
  counterexamples:
  - text: >-
      Studies where a public-service dataset is merely the data source for estimating an
      individual outcome or descriptive pattern.
    rationale: >-
      Use of service records does not make the purpose service-system analysis unless pathways,
      access, processing, or system movement are central.
    instead_consider:
      - "Outcome Tracking"
      - "Descriptive Monitoring"
- label: Policy Evaluation / Impact Analysis
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research that evaluates the effects, impacts, implementation, or consequences of a specific named policy, programme, regulation, intervention, scheme, or institutional change.
  inclusion_rules: >-
    Assign when the project studies a deliberate policy action or intervention: Universal Credit, National Living Wage, Enterprise Zones, tax reliefs, transport schemes, business-support programmes, public investment, school or apprenticeship policies, and similar.
  exclusion_rules: >-
    Do not assign where the exposure is a naturally occurring event, condition, or characteristic. Use Outcome Tracking for non-policy exposures. Use Descriptive Monitoring if the project only profiles or monitors a phenomenon.
  examples:
  - text: >-
      Studies comparing outcomes before, after, or around a designed policy or programme to
      understand its effects.
    rationale: >-
      The analytical operation is evaluation of an intentional intervention, regardless of whether
      the domain is business, labour, education, or public finance. The domain may be business,
      public finance, or another substantive area; this purpose captures the evaluative design.
  counterexamples:
  - text: >-
      Studies of naturally occurring conditions or characteristics, such as illness, debt, housing
      conditions, or family context.
    rationale: >-
      These may involve outcome analysis, but they are not policy evaluation unless a named
      intervention is the exposure.
    instead_consider:
      - "Outcome Tracking"
- label: Risk Prediction / Early Identification
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research with an explicit predictive or early-identification design focused on predicting risk, identifying at-risk individuals or groups, building risk scores, developing screening tools, or prospectively targeting people or places before or as an adverse outcome emerges.
  inclusion_rules: >-
    Assign only where the project explicitly involves prediction, risk scoring, screening, early identification, a prediction model, or prospective targeting of at-risk individuals or groups. The design must aim to identify who or where is at elevated risk before or as the outcome emerges.
  exclusion_rules: >-
    Do not assign merely because a project uses risk, risk factor, predictor, or similar vocabulary, or estimates associations between exposures and outcomes. Use **Outcome Tracking** where the project analyses predictors or risk factors without a prediction, screening, early-identification, or prospective-targeting aim.
  examples:
  - text: >-
      Studies building or using a risk score, prediction model, screening approach, or
      early-identification method for future or emerging adverse outcomes.
    rationale: >-
      This purpose is illustrated by prospective identification or prediction, not by risk
      vocabulary alone.
  - text: >-
      Studies estimating elevated likelihood of future harm, crisis, service need, perpetration,
      victimisation, or clinical/event occurrence for individuals or groups.
    rationale: >-
      The analytical operation is to identify who or where is at heightened risk before or as the
      adverse outcome emerges.
  counterexamples:
  - text: >-
      Studies estimating associations between an exposure and an outcome without building a
      prediction, screening, or early-identification tool.
    rationale: >-
      Risk factors can be analysed as outcome tracking when the design does not aim to predict or
      identify elevated risk.
    instead_consider:
      - "Outcome Tracking"
- label: Methodological / Infrastructure Research
  layer: Layer C -- purpose
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: >-
    Research whose primary purpose is to develop, test, validate, improve, or document methods, data infrastructure, measurement frameworks, linkage approaches, survey methods, or data assets. Distinction from Layer A **Data Infrastructure & Methodology**: this Layer C purpose applies when the analytical purpose is methodological or infrastructural -- what the project is doing. The Layer A domain applies when data, methods, or statistical infrastructure are the substantive object of the research -- what the project is about. The two layers answer different questions, so a methods-focused project may legitimately carry both by design.
  inclusion_rules: >-
    Assign where the methodological or infrastructural contribution is the main point: developing a dataset, validating a measure, improving data quality, testing linkage, correcting non-response, improving estimates, or assessing survey/data methods.
  exclusion_rules: >-
    Do not assign just because a project uses advanced methods, linked data, administrative data, or machine learning. If the method serves a substantive question, classify by the substantive analytical purpose.
  examples:
  - text: >-
      Studies developing, testing, validating, improving, or documenting methods, measures, data
      quality, classifications, datasets, or linkage approaches.
    rationale: >-
      This purpose is illustrated when the methodological or infrastructural contribution is the
      main analytical operation. A substantive domain can still be assigned separately; this
      purpose captures the method or infrastructure contribution.
  - text: >-
      Studies whose purpose is to shape, assess, or demonstrate the value of a data asset,
      measurement framework, or classification system.
    rationale: >-
      The work is about producing better research infrastructure rather than primarily answering a
      substantive policy question.
  counterexamples:
  - text: >-
      Substantive studies that use administrative data, linkage, modelling, or advanced methods
      only as tools to answer another research question.
    rationale: >-
      Methods are instrumental in many projects; this purpose requires method or infrastructure
      development to be central.
    instead_consider:
      - "Outcome Tracking"
      - "Service Interaction / Systems Analysis"
      - "Policy Evaluation / Impact Analysis"

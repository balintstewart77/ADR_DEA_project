- label: Cross-Domain Linkage
  layer: Layer B -- linkage
  status: active
  version_added: v3
  version_changed: v3.3
  date_added: '2026-03-26'
  date_changed: '2026-04-23'
  definition: |
    The project links, combines, or uses datasets spanning two or more distinct policy domains, including cases where the register lists a single pre-linked product whose component sources are cross-domain.
  inclusion_rules: |
    Assign where datasets span at least two policy domains, such as education plus employment, welfare plus labour market, health plus housing, justice plus employment, or agriculture plus individuals/households. Treat pre-linked products according to their component domains, not simply the number of names listed.
  exclusion_rules: |
    Do not assign where multiple datasets all remain within one policy domain. Do not assign to a single-domain pre-linked product such as COVID-19 infection data linked to test-and-trace data if both remain within health.
  examples:
    - description: "ECHILD"
      assign: "Cross-Domain Linkage"
      likely_co_labels:
        - "Education & Skills"
        - "Health & Social Care"
      rationale: "Pre-linked education and health/social-care data."
    - description: "ASHE linked to Census 2011"
      assign: "Cross-Domain Linkage"
      likely_co_labels:
        - "Labour Market & Employment"
        - "Migration & Demographics"
      rationale: "Employment/earnings linked to census/demographic data."
    - project_id: "2020/021"
      title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
      assign: "Cross-Domain Linkage if datasets span labour and household/welfare sources"
      likely_co_labels:

metadata:
  title: Taxonomy Data Dictionary -- DEA Project Classification Ontology v3.4
  generated: '2026-05-22'
  derivation: |-
    Classification ontology developed inductively from the UK Statistics Authority
    public register of DEA-accredited research projects. No single authoritative
    external taxonomy was identified that fits the scope of DEA-accredited research
    activity; the scheme was therefore derived bottom-up from the register and
    compared against ADR UK's research themes for interoperability rather than
    adopted from a standard. The taxonomy is developed with in mind and  assessed 
    against the ONS Taxonomy Best Practice Evaluation Framework.
  dictionary_compiled_from:
  - project git history
  - v3.3 classification prompt
  - v3.4 ontology decisions
  - taxonomy owner review of definitions, rules, examples and counterexamples
  taxonomy_owner: Project Lead, DEA Dashboard
  layer_cardinality:
    Layer A -- domain: one or more
    Layer B -- linkage: exactly one
    Layer C -- purpose: one or two
    Cross-cutting tag: zero or more / boolean facets
  example_schema:
    note: |
      Examples represent unordered multi-label sets; there is no primary label. The classifier assigns 1-2 domains and 1-2 purposes with no ranking among labels within those layers.
    fields:
      project_id: The DEA register project ID the example is drawn from.
      title: The project's exact title from the register, with register data-quality defects cleaned.
      datasets: The project's "Datasets Used" value from the register.
      description: Used instead of project_id for abstract or illustrative examples not tied to a single register row.
      domains: Layer A substantive domains assigned to the example as an unordered set, usually 1-2 values.
      linkage: The Layer B linkage mode assigned to the example as a single value, or null when not specified by the example.
      purposes: Layer C analytical purposes assigned to the example as an unordered set, usually 1-2 values.
      tags: Cross-cutting tags assigned to the example as an unordered set.
      conditional_labels: Labels that would additionally apply if a stated condition holds; each item has label, layer, and condition.
      condition: A stated precondition under which the example's classification holds.
      rationale: Explanation of why the example is classified as shown.
      replacement: On a counterexample, the classification that should be used instead.
      former_label: On a removed-category entry, the retired label.
      replacement_classification: On a removed-category entry, what former assignments should now become.
  category_identity_note: |-
    Category identity is defined by the combination of project title and datasets used, not by title alone.
    The fallback label "Unclear from Register Entry" appears separately in Layer A, Layer B,
    and Layer C, and these are distinct categories.
  governance:
    taxonomy_owner: Project Lead, DEA Dashboard
    review_process: |-
      Proposed changes to labels, definitions, inclusion rules, exclusion rules, or examples
      must be recorded in the methods log and reviewed before implementation in the classifier
      prompt or dashboard.
    change_approval: |-
      Structural changes, including added, removed, merged, split, or relabelled categories,
      require explicit author approval before use in a classification run.
    validation_protocol: |-
      Major ontology revisions must be followed by a validation pass using a stratified sample
      that oversamples known boundary cases and historically unstable categories.
    feedback_route: |-
      Feedback is collected through the DEA Dashboard project feedback route and reviewed as
      part of the taxonomy revision cycle.
    next_review_trigger: |-
      Review after first round of external feedback, v4 validation, after substantial changes to the DEA register, or when repeated
      validation errors indicate a category boundary problem.
  notes:
  - Cells prefixed (from prompt) or (historical, from prompt) are extracted verbatim from the v3.3 classification prompt.
  - This file is the single source of truth. CSV or Markdown renderings are generated from it (for ease of machine/human readibility).
  v3_4_changes:
  - 'Layer A: "Gender, Race & Ethnicity" removed (replaced by cross-cutting tag). "Poverty, Inequality & Living Standards" relabelled to "Poverty, Wealth & Living Standards". 
    "Unclear from Title" renamed to "Unclear from Register Entry" (as labels are generated from titles AND datasets used, not titles alone). 12 active domains + Unclear from Register Entry.'
  - 'Layer B: "Unclear from Title" renamed to "Unclear from Register Entry" (same reason as for layer A). 3 active linkage modes + Unclear from Register Entry.'
  - 'Layer C: "Inequality / Disparities Analysis" removed. "Unclear from Title" renamed to "Unclear from Register Entry" (same reason as for layer A). 7 active purposes + Unclear from Register Entry.'
  - 'New: Cross-cutting demographic-disparities/equity tag, orthogonal to the three layers.'
  balance_note: |
    Balance: the categories vary considerably in size. Some Layer C purposes — notably Risk Prediction / Early Identification and Service Interaction / Systems Analysis — are small. 
    They are retained as genuine, conceptually distinct analytical purposes and on future-proofing grounds (these kinds of research are expected to become more common). No claim is 
    made about trends over time in these small categories: at their current size, year-on-year variation is not statistically meaningful and should not be read as a trend.
  covid_category_type_note: |
    COVID-19 & Pandemic is retained as a Layer A domain but is a category-type anomaly: unlike the other domains, which are policy/sector areas, it is a time-bounded event that cuts across domains 
    (its own inclusion rule directs that it be assigned alongside a substantive domain). This is the same category-type issue that led to the removal of "Gender, Race & Ethnicity" from Layer A. 
    Whether COVID-19 should likewise be converted from a domain to a cross-cutting tag is a documented open question, to be decided after v4 validation; it is not changed in v3.4.
  adr_uk_theme_alignment:
    description: |
      Mapping of this dictionary's Layer A domains to ADR UK's seven research themes, for interoperability reference under the ONS framework's interoperability principle. This alignment is a 
      comparison, not an adoption: the dictionary's domains were derived inductively from the DEA register and diverge from ADR UK's themes where the register's scope is broader.
    source: ADR UK website research themes page
    accessed: '2026-05-22'
    adr_uk_themes:
    - Housing & communities
    - Health & wellbeing
    - Children, young people & education
    - Employment & the economy
    - Climate & the environment
    - Social mobility & inclusion
    - Crime & justice
    mapping:
      Labour Market & Employment:
        adr_uk_theme: Employment & the economy
        alignment_type: close
        note: Covers labour-market research; ADR UK theme also includes wider economic activity.
      Education & Skills:
        adr_uk_theme: Children, young people & education
        alignment_type: close
        note: Close match for education and skills research, although this ontology also includes adult skills and workforce training.
      Health & Social Care:
        adr_uk_theme: Health & wellbeing
        alignment_type: close
        note: Close match, with this ontology using a more service-facing health and social care label.
      Crime & Justice:
        adr_uk_theme: Crime & justice
        alignment_type: close
        note: Direct match.
      Business & Productivity:
        adr_uk_theme: Employment & the economy
        alignment_type: partial
        note: ADR UK combines employment and economy; this ontology separates firm/productivity research from labour-market research because the DEA register contains substantial business-data use.
      Poverty, Wealth & Living Standards:
        adr_uk_theme: Social mobility & inclusion
        alignment_type: partial
        note: Partial overlap only. ADR UK's theme is broader, covering social mobility and inclusion; this ontology narrows the domain to material resources, poverty, wealth, benefits, debt, 
          and living standards.
      Housing & Planning:
        adr_uk_theme: Housing & communities
        alignment_type: close
        note: Close match, though this ontology foregrounds housing, planning and residential conditions.
      Migration & Demographics:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. ADR UK's seven themes do not include a dedicated migration/demography theme. Population structure, migration, fertility and mortality (ONS provides access to mortality 
          data) are a substantial strain of research in the DEA register, the absence of an ADR UK match relects the broader scope of this register-derived scheme rather than a weaker claim to domain status.
      Environment & Agriculture:
        adr_uk_theme: Climate & the environment
        alignment_type: partial
        note: Partial overlap. ADR UK's theme emphasises climate and environment; this ontology also includes agriculture, land use and farming because these appear in projects in the DEA register.
      Public Finance & Taxation:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. Public finance and taxation are retained because the DEA register includes fiscal, tax and public-expenditure research.
      COVID-19 & Pandemic:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. COVID-19 is a time-bounded cross-domain event rather than a standing ADR UK research theme.
      Data Infrastructure & Methodology:
        adr_uk_theme: null
        alignment_type: no_equivalent
        note: No direct ADR UK equivalent. Methodological and data-infrastructure research is retained as a domain because it is visible in the DEA register.
categories:
- label: Labour Market & Employment
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning work, employment, labour-market participation, and workforce dynamics. Includes wages and earnings; employment, unemployment, inactivity and underemployment; job quality, 
    working hours, contracts and working conditions; labour supply and demand; occupational, sectoral and geographic mobility; workforce recruitment and retention; skills demand and mismatch; and 
    transitions into, through, or out of work.
  inclusion_rules: |
    Assign when work, employment, earnings, labour supply or demand, workforce composition, job quality, occupational structure, or labour-market transitions are central to the project.
  exclusion_rules: |
    Do not assign solely because a project mentions income, education, productivity, health, migration, or workers. Use **Education & Skills** for education systems and qualifications unless 
    labour-market outcomes are central. Use **Poverty, Wealth & Living Standards** for household resources, poverty, wealth, debt, or living standards unless employment/earnings are the main object.
  examples:
  - project_id: 2019/003
    title: "The fall of the labour share and rise of the superstar region - Labour share and earning in UK regions"
    datasets: "Office for National Statistics: Annual Respondents Database"
    domains:
    - Labour Market & Employment
    linkage: null
    purposes: []
    tags: []
    conditional_labels:
    - label: Business & Productivity
      layer: Layer A -- domain
      condition: Use if firm behaviour, productivity, innovation, or regional business dynamics are central.
    rationale: Labour share and earnings make the labour-market domain mandatory; firm/productivity dynamics may also be central.
  - project_id: 2020/021
    title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
    datasets: "Office for National Statistics: Annual Population Survey & Annual Survey of Hours and Earnings"
    domains:
    - Labour Market & Employment
    - Poverty, Wealth & Living Standards
    linkage: null
    purposes:
    - Policy Evaluation / Impact Analysis
    tags: []
    conditional_labels: []
    rationale: Employment, hours and earnings are central; household income may also bring in material living standards; National Living Wage is a named policy.
  - project_id: 2021/027
    title: "SEARCH, SKILLS AND SATISFACTION: THE EMPLOYMENT TRAJECTORIES OF REFUGEES IN THE UK"
    datasets: "Office for National Statistics: Annual Population Survey, Labour Force Survey & Labour Force Survey"
    domains:
    - Labour Market & Employment
    - Migration & Demographics
    linkage: null
    purposes:
    - Life-Course / Trajectory Analysis
    tags: []
    conditional_labels: []
    rationale: Employment trajectories make this labour-market research; refugee status brings in migration/demography.
  counterexamples:
  - project_id: 2020/013
    title: "Firm-level analysis of research and development"
    datasets: "Office for National Statistics: Business Expenditure on Research and Development - England, Wales and Scotland, Business Structure Database, Business Structure Database Longitudinal, Annual Business Survey, Annual Respondent Database 2 \nIntellectual Property Office: Patents, Designs and Trade Marks \nOffice for National Statistics / \nDepartment for Business, Energy and Industrial Strategy: Covid-19 Infection Survey linked with UK Innovation Survey"
    replacement: Business & Productivity
  - project_id: 2020/008
    title: "Contextualised Admissions and University Choice"
    datasets: "UCAS: Universities and Colleges Admissions Service"
    replacement: Education & Skills
- label: Education & Skills
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning education, learning, training, skills formation, and transitions through education systems. Includes early years, schools, colleges, universities, qualifications, apprenticeships, admissions, attainment, attendance, teacher workforce issues, childcare, and education-to-work pathways.
  inclusion_rules: |
    Assign when the project's substantive focus is educational participation, attainment, qualifications, admissions, skills acquisition, apprenticeship pathways, school absence, teacher supply, or educational progression.
  exclusion_rules: |
    Do not assign merely because a project uses education data if the research question is mainly about employment, health, crime, poverty, or demography. Add **Labour Market & Employment** where the project studies employment or earnings outcomes after education.
  examples:
  - project_id: 2020/117
    title: "Participation in and Progression Through Education in Wales: The Role of Family"
    datasets: "SAIL Databank Databank: 2011 Census Data Welsh residents"
    domains:
    - Education & Skills
    linkage: null
    purposes:
    - Life-Course / Trajectory Analysis
    tags: []
    conditional_labels:
    - &id001
      label: Poverty, Wealth & Living Standards
      layer: Layer A -- domain
      condition: Use if household resources, poverty, wealth, debt, or material living standards are substantive outcomes.
    rationale: Educational participation and progression are central; family background may bring in material conditions depending on detail.
  - project_id: 2020/008
    title: "Contextualised Admissions and University Choice"
    datasets: "UCAS: Universities and Colleges Admissions Service"
    domains:
    - Education & Skills
    linkage: null
    purposes: []
    tags: []
    conditional_labels:
    - label: Policy Evaluation / Impact Analysis
      layer: Layer C -- purpose
      condition: Use if the project evaluates a contextual admissions policy rather than only describing admissions or choices.
    rationale: Admissions and university choice are education-system topics.
  - project_id: 2024/259
    title: "Risk index of NEET for local authority use"
    datasets: "DfE, DWP and \nHMRC: Longitudinal Education Outcomes SRS Iteration 2 Standard Extract - England"
    domains:
    - Education & Skills
    - Labour Market & Employment
    linkage: null
    purposes:
    - Risk Prediction / Early Identification
    tags: []
    conditional_labels: []
    rationale: NEET sits at the education-work boundary; "risk index" makes the predictive purpose explicit.
  counterexamples:
  - project_id: 2020/010
    title: "Local labour market effects of immigration"
    datasets: "Office for National Statistics: Annual Population Survey, Quarterly Labour Force Survey & Annual Survey of Hours and Earnings \nInstitute for Economic and Social Research: Understanding Society"
    replacement: Labour Market & Employment / Migration & Demographics
  - project_id: 2020/012
    title: "Wage progression and firm productivity"
    datasets: "Office for National Statistics: Annual Business Inquiry, Annual Inquiry into Foreign Direct Investment, Annual Respondents DatabaseX, Annual Respondents Database, Annual Survey of Hours and Earnings, Business Expenditure on Research and Development, Business Impact of COVID-19 Survey, Business Register Employment Survey, Business Structure Database, Business Structure Database Longitudinal, Capital Stocks, Financial Assets and Liabilities Survey, Interdepartmental Business Register, Investment in Intangible Assets, International Trade in Services, Labour Force Survey, Monthly Wage and Salary Survey, New Earnings Survey, Quarterly Capital Expenditure Survey, Survey of Innovation and Patent Use, Vacancy Survey, ASHE \nIntellectual Property Office: Patents, Designs and Trade Marks \nDepartment for Education: National \nDepartment for Business, Energy and Industrial Strategy: Employer Skills Survey & Workplace Employment Relations Survey \nDepartment for Business, Energy and Industrial Strategy: Small Business Survey Longitudinal \nDepartment for Business, Energy and Industrial Strategy: Community Innovation Survey"
    replacement: Labour Market & Employment / Business & Productivity
  - project_id: 2022/139
    title: "Understanding and predicting health and social care utilisation and adverse outcomes"
    datasets: "SAIL Databank Databank: 2011 Census Data Welsh residents"
    replacement: Health & Social Care
- label: Health & Social Care
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning health, illness, mortality, wellbeing, clinical outcomes, health services, public health, mental health, social care, and care-system use. Includes NHS services, hospitals, GP care, palliative care, maternity, morbidity, mortality where health is the research object, and adult or children's social care.
  inclusion_rules: |
    Assign when the project studies health outcomes, healthcare access, mental health, mortality as a health outcome, social care, care pathways, service utilisation, clinical risk, morbidity, or wellbeing with a health focus.
  exclusion_rules: |
    Do not assign mortality projects automatically. Use **Migration & Demographics** for mortality as a demographic/population outcome. Use **Service Interaction / Systems Analysis** as the purpose where the focus is pathways through services rather than health outcomes.
  examples:
  - project_id: 2019/005
    title: "Measuring the impact of hearing loss on well-being"
    datasets: "Office for National Statistics: Annual Population Survey"
    domains:
    - Health & Social Care
    linkage: null
    purposes:
    - Outcome Tracking
    tags: []
    conditional_labels: []
    rationale: Hearing loss and wellbeing are health-related outcomes; "impact" suggests exposure-outcome analysis.
  - project_id: 2019/021
    title: "Social and Economic Predictors of the severe mental disorders, the SEP-MD study. Analysis of linked data from southeast London, UK"
    datasets: "Office for National Statistics: Census 2011 & Death Registrations"
    domains:
    - Health & Social Care
    - Poverty, Wealth & Living Standards
    linkage: null
    purposes:
    - Outcome Tracking
    tags: []
    conditional_labels: []
    rationale: Severe mental disorder is the health outcome; social/economic predictors may bring in material conditions.
  - project_id: 2024/216
    title: "Psychosocial disadvantage in pregnancy: risk of severe maternal morbidity and adverse perinatal outcomes and the role of antenatal care."
    datasets: "NHS; DfE: Education and Child Health Insights from Linked Data - England"
    domains:
    - Health & Social Care
    - Poverty, Wealth & Living Standards
    linkage: null
    purposes: []
    tags: []
    conditional_labels:
    - label: Risk Prediction / Early Identification
      layer: Layer C -- purpose
      condition: Use if the project builds or applies prediction, screening, risk scoring, or early-identification methods.
    - label: Outcome Tracking
      layer: Layer C -- purpose
      condition: Use if the project primarily estimates exposure-outcome associations.
    rationale: Pregnancy morbidity is health-focused; disadvantage may be a socioeconomic exposure.
  counterexamples:
  - project_id: 2020/092
    title: "Understanding Recent Fertility in the UK and Improving Methodologies for Fertility Forecasting"
    datasets: "Office for National Statistics: ONS Longitudinal Study of England and Wales"
    replacement: Migration & Demographics / Methodological
  - project_id: 2019/025
    title: "Understanding the uptake and use of the Northern Ireland Concessionary Fares Scheme for the population aged 60 and over"
    datasets: "Northern Ireland Statistics and Research Agency: Census 2011 & Census 2011 \nNorthern Ireland Registrar General's Office: Registered Deaths"
    replacement: Migration & Demographics / Service Interaction
  - project_id: 2020/058
    title: "Movers and stayers: explaining variation in residential energy consumption using longitudinal observations of annual energy consumption in moving households"
    datasets: "Department for Business, Energy and Industrial Strategy: Annual gas and electricity consumption at the meter level"
    replacement: Environment & Agriculture
- label: Crime & Justice
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning crime, victimisation, public safety, offending, policing, courts, prisons, probation, sentencing, family justice, civil justice, reoffending, and criminal records.
  inclusion_rules: |
    Assign when the project's substantive focus is offending, victimisation, domestic abuse, policing, courts, sentencing, imprisonment, probation, youth justice, family justice, civil justice, or justice-system outcomes.
  exclusion_rules: |
    Do not assign merely because a project studies "risk", "fairness", "violence", or "families" unless the justice system, criminal behaviour, legal proceedings, or victimisation are central.
  examples:
  - project_id: 2019/006
    title: "Analysis of victimisation data from the Crime Survey for England and Wales"
    datasets: "Office for National Statistics: Crime Survey for England and Wales"
    domains:
    - Crime & Justice
    linkage: null
    purposes:
    - Descriptive Monitoring
    tags: []
    conditional_labels: []
    rationale: Victimisation and crime survey analysis are justice/public-safety topics.
  - project_id: 2021/038
    title: "Using linked Magistrates and Crown Court data to explore defendant appearance over time: specialisation, escalation or de-escalation?"
    datasets: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, MoJ Data First Linked Criminal Courts defendant case level dataset & MoJ Data First magistrates' court defendant case level dataset"
    domains:
    - Crime & Justice
    linkage: Within-Domain Linkage
    purposes:
    - Life-Course / Trajectory Analysis
    tags: []
    conditional_labels: []
    rationale: Courts data place this in justice; repeated appearances over time suggest trajectory analysis.
  - project_id: 2023/073
    title: "Domestic abuse proceedings in family courts: Overlap and pathways in private and public family justice"
    datasets: "Ministry of Justice: Data First FamilyMan Family Court data"
    domains:
    - Crime & Justice
    linkage: null
    purposes:
    - Service Interaction / Systems Analysis
    tags: []
    conditional_labels:
    - label: Health & Social Care
      layer: Layer A -- domain
      condition: Use if health, healthcare, mental health, mortality, or care outcomes are central.
    rationale: Family court proceedings and domestic abuse pathways are justice-system topics.
  counterexamples:
  - project_id: 2019/022
    title: "Research on homeless mortality among St Mungo's clients"
    datasets: "Office for National Statistics: Death Registrations"
    replacement: Housing & Planning / Health & Social Care
  - project_id: 2023/006
    title: "Ethnic Minority British Election Study pilot"
    datasets: "Office for National Statistics: Annual Population Survey"
    replacement: Migration & Demographics
  - project_id: 2024/216
    title: "Psychosocial disadvantage in pregnancy: risk of severe maternal morbidity and adverse perinatal outcomes and the role of antenatal care."
    datasets: "NHS; DfE: Education and Child Health Insights from Linked Data - England"
    replacement: Health & Social Care
- label: Business & Productivity
  layer: Layer A -- domain
  status: active
  include_in_prompt: true
  version_added: v3
  version_changed: null
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning firms, business activity, industrial structure, innovation, productivity, entrepreneurship, trade, exports, foreign direct investment, research and development, business support, and firm-level performance.
  inclusion_rules: |
    Assign when the project studies firms, business behaviour, productivity, innovation, investment, exporting, enterprise support, start-ups, industrial policy, business surveys, or firm-level outcomes.
  exclusion_rules: |
    Do not assign simply because a project uses firm-level data if the substantive question is mainly about workers, wages, public finance, or environmental impacts. Add **Labour Market & Employment** where jobs, wages, workforce composition, or employment outcomes are central.
  examples:
  - project_id: 2019/011
    title: "Modelling Return on Investment at the firm level"
    datasets: "Department for Business, Energy & Industrial Strategy: UK Innovation Survey\n\nOffice for National Statistics: Annual Business Survey, Business Enterprise Research and Development, Business Register and Employment Survey"
    domains:
    - Business & Productivity
    linkage: null
    purposes: []
    tags: []
    conditional_labels:
    - &id004
      label: Outcome Tracking
      layer: Layer C -- purpose
      condition: Use if the project estimates an exposure-outcome relationship.
    - &id005
      label: Descriptive Monitoring
      layer: Layer C -- purpose
      condition: Use if the project primarily profiles levels, patterns, distributions, or trends.
    rationale: Firm-level ROI is a business-performance topic.
  - project_id: 2020/013
    title: "Firm-level analysis of research and development"
    datasets: "Office for National Statistics: Business Expenditure on Research and Development - England, Wales and Scotland, Business Structure Database, Business Structure Database Longitudinal, Annual Business Survey, Annual Respondent Database 2 \nIntellectual Property Office: Patents, Designs and Trade Marks \nOffice for National Statistics / \nDepartment for Business, Energy and Industrial Strategy: Covid-19 Infection Survey linked with UK Innovation Survey"
    domains:
    - Business & Productivity
    linkage: null
    purposes: []
    tags: []
    conditional_labels:
    - label: Methodological / Infrastructure Research
      layer: Layer C -- purpose
      condition: Use if the primary contribution is methodological or infrastructural rather than substantive analysis.
    rationale: R&D and firm-level analysis sit squarely in business/productivity.
  - project_id: 2020/024
    title: "Assessing the impact of UK Enterprise Zones"
    datasets: "Office for National Statistics: Annual Respondents Database, Annual Business Survey, Annual Survey of Hours and Earnings, Business Structure Database & Quarterly Labour Force Survey"
    domains:
    - Business & Productivity
    linkage: null
    purposes:
    - Policy Evaluation / Impact Analysis
    tags: []
    conditional_labels:
    - label: Labour Market & Employment
      layer: Layer A -- domain
      condition: Use if jobs, wages, workforce composition, or employment outcomes are central.
    rationale: Enterprise Zones are business/economic policy; employment outcomes may add labour-market domain.
  counterexamples:
  - project_id: 2020/012
    title: "Wage progression and firm productivity"
    datasets: "Office for National Statistics: Annual Business Inquiry, Annual Inquiry into Foreign Direct Investment, Annual Respondents DatabaseX, Annual Respondents Database, Annual Survey of Hours and Earnings, Business Expenditure on Research and Development, Business Impact of COVID-19 Survey, Business Register Employment Survey, Business Structure Database, Business Structure Database Longitudinal, Capital Stocks, Financial Assets and Liabilities Survey, Interdepartmental Business Register, Investment in Intangible Assets, International Trade in Services, Labour Force Survey, Monthly Wage and Salary Survey, New Earnings Survey, Quarterly Capital Expenditure Survey, Survey of Innovation and Patent Use, Vacancy Survey, ASHE \nIntellectual Property Office: Patents, Designs and Trade Marks \nDepartment for Education: National \nDepartment for Business, Energy and Industrial Strategy: Employer Skills Survey & Workplace Employment Relations Survey \nDepartment for Business, Energy and Industrial Strategy: Small Business Survey Longitudinal \nDepartment for Business, Energy and Industrial Strategy: Community Innovation Survey"
    replacement: Labour Market & Employment plus Business & Productivity
  - project_id: 2020/019
    title: "The impact of government expenditure on employment and wages: evidence from firm-level data for the UK"
    datasets: "Office for National Statistics: Annual Business Survey, Annual Respondents Database, Annual Survey of Hours and Earnings, Business Register and Employment Survey & Business Structure Database"
    replacement: Public Finance & Taxation / Labour Market & Employment
  - project_id: 2020/021
    title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
    datasets: "Office for National Statistics: Annual Population Survey & Annual Survey of Hours and Earnings"
    replacement: Labour Market & Employment
- label: Poverty, Wealth & Living Standards
  layer: Layer A -- domain
  status: relabelled v3.4
  include_in_prompt: true
  version_added: v3
  version_changed: v3.4
  date_added: '2026-03-26'
  date_changed: null
  definition: |
    Research concerning material resources, economic hardship, household living standards, poverty, wealth, debt, savings, benefits, deprivation, food security, cost of living, household income, and distribution of resources.
  inclusion_rules: |
    Assign when the project's substantive focus is poverty, household income, wealth, savings, debt, benefits, deprivation, food insecurity, living standards, economic hardship, or household resources.
  exclusion_rules: |
    Do not assign solely because a title mentions pay gaps, employment, or socioeconomic differences. Use **Labour Market & Employment** for wages, pay, earnings, job status, and occupational outcomes unless household resources or poverty are central. Comparison of material conditions (poverty, income, wealth) across demographic groups (e.g. by age cohort, ethnicity, or sex) qualifies for the **Demographic disparities / equity tag** in addition to this domain.
  examples:
  - project_id: 2019/015
    title: "Understanding saving behaviour in the UK"
    datasets: "Office for National Statistics: Wealth and Assets Survey & Annual Survey of Hours and Earnings"
    domains:
    - Poverty, Wealth & Living Standards
    linkage: null
    purposes: []
    tags: []
    conditional_labels:
    - &id002
      label: Descriptive Monitoring
      layer: Layer C -- purpose

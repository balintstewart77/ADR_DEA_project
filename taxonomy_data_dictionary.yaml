- label: Gender, Race & Ethnicity
  layer: Layer A -- domain
  status: removed v3.4
  date_added: 2026-03-26 (6e067f4)
  date_changed: v3.4 (removed)
  project_count: 109 (v3.3 output, historical)
  owner: '[AUTHOR TO CONFIRM]'
  definition: '(historical, from prompt) "gender gaps, racial disparities as the *primary research question* (not when demographic
    variables appear as controls or covariates)." Removed at v3.4: functioned as a demographic lens across substantive domains
    rather than a domain in its own right. 109 projects carried this label; 89 as secondary domain (trivially dropped), 17
    with fallback primary domain, 3 sole-domain cases reclassifiable. Replaced by the cross-cutting demographic-disparities
    tag.'
  inclusion_rules: '(historical, from prompt) "Gender, Race & Ethnicity is for projects where a demographic disparity IS the
    primary research question (not just a covariate)." Anti-tautology rule (ad34cb6): "a Gender, Race & Ethnicity project
    is NOT automatically Inequality / Disparities Analysis."'
  exclusion_rules: (historical, from prompt) "not when demographic variables appear as controls or covariates." Counterexample
    8 further specifies this boundary.
  examples: '(historical, from prompt) Example 6: "Shaping and demonstrating the value of the Growing up in England dataset:
    Roma, Gypsy and Traveller children case study" (assigned alongside Education & Skills). Example 7: "Ethnic disparities
    in the impact of Universal Credit on employment transitions" (assigned alongside Labour Market & Employment and Poverty,
    Inequality & Living Standards).'
  counterexamples: '(historical, from prompt) Example 8: "Understanding employment outcomes for ethnic minority graduates"
    -- NOT assigned Gender, Race & Ethnicity because "ethnicity is used as a stratifying variable, but the research question
    is about education-to-employment outcomes, not about racial disparities per se."'

- code: 11
  canonical_label: Data Infrastructure & Methodology
  owner_layer: domain
  source_layer: Layer A -- domain
  source_status: active
  effective_status: active_current_prompt_category
  include_in_prompt: true
  include_in_owner_missing_menu: true
  owner_microdefinition: Data or methodology as the primary research object, rather
    than tools used for another question.
  owner_reference_definition: Research primarily focused on the methods, measures,
    tools, classifications, linkage processes, data quality, survey design, statistical
    infrastructure, or dataset development needed to produce, improve, validate, or
    use research data. This applies where data infrastructure, linkage, measurement
    or methodology is itself the primary research object, not merely a tool used to
    answer another substantive question.
  source_dictionary_version: 1.0-rc2
  source_definition: Research primarily focused on the methods, measures, tools, classifications,
    linkage processes, data quality, survey design, statistical infrastructure, or
    dataset development needed to produce, improve, validate, or use research data.
  traceability: Reference definition combines the frozen definition with an imported
    exclusion/boundary clause approved in the 2026-07-23 addendum; inline microdefinition
    is unchanged.
  wording_origin: frozen_definition_plus_imported_exclusion_boundary_clause
  reference_definition_provenance: frozen_definition_plus_imported_exclusion_boundary_clause
  imported_boundary_source_field:
  - inclusion_rules
  - exclusion_rules
  imported_boundary_source_path:
  - taxonomy_data_dictionary.yaml::categories[layer="Layer A -- domain",label="Data
    Infrastructure & Methodology"].inclusion_rules
  - taxonomy_data_dictionary.yaml::categories[layer="Layer A -- domain",label="Data
    Infrastructure & Methodology"].exclusion_rules
  imported_boundary_source_text:
  - Assign when the data asset, linkage process, measurement approach, classification,
    survey method, statistical method, or research infrastructure is itself the substantive
    object of the project.
  - Do not assign solely because a project uses linked data, administrative data,
    statistical methods, or a secure research environment to study another substantive
    domain. In those cases, assign the substantive domain and, where appropriate,
    Methodological / Infrastructure Research in Layer C.
  imported_boundary_note: Participant-reference wording imports an authoritative inclusion
    or exclusion boundary; it is not a verbatim source definition.
  reused_or_condensed: approved_microdefinition_with_frozen_definition_plus_imported_boundary_clause

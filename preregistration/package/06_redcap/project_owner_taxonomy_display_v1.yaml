- code: 2
  canonical_label: Outcome Tracking
  owner_layer: purpose
  source_layer: Layer C -- purpose
  source_status: active
  effective_status: active_current_prompt_category
  include_in_prompt: true
  include_in_owner_missing_menu: true
  owner_microdefinition: Linking a naturally occurring exposure, condition or event
    to a later outcome, where the exposure is not a deliberate policy or programme.
  owner_reference_definition: Research that links a naturally occurring exposure,
    condition, event, status, characteristic, or circumstance to a downstream outcome.
    This does not apply where the exposure is a deliberate named policy, programme,
    reform or intervention; that is Policy Evaluation / Impact Analysis.
  source_dictionary_version: 1.0-rc2
  source_definition: Research that links a naturally occurring exposure, condition,
    event, status, characteristic, or circumstance to a downstream outcome.
  traceability: Reference definition combines the frozen definition with an imported
    exclusion/boundary clause approved in the 2026-07-23 addendum; inline microdefinition
    is unchanged.
  wording_origin: frozen_definition_plus_imported_exclusion_boundary_clause
  reference_definition_provenance: frozen_definition_plus_imported_exclusion_boundary_clause
  imported_boundary_source_field:
  - inclusion_rules
  - exclusion_rules
  imported_boundary_source_path:
  - taxonomy_data_dictionary.yaml::categories[layer="Layer C -- purpose",label="Outcome
    Tracking"].inclusion_rules
  - taxonomy_data_dictionary.yaml::categories[layer="Layer C -- purpose",label="Outcome
    Tracking"].exclusion_rules
  imported_boundary_source_text:
  - Assign where the project links a naturally occurring exposure, condition, event,
    status, characteristic, or circumstance to a downstream outcome, and the exposure
    is not a deliberate named policy, programme, or intervention.
  - Do not assign where the exposure is a named policy, programme, reform, or intervention;
    use **Policy Evaluation / Impact Analysis**. Do not assign if the project only
    measures patterns or trends; use **Descriptive Monitoring**. Do not assign where
    the aim is prospective prediction, risk scoring, screening, or early identification;
    use **Risk Prediction / Early Identification**. Do not assign where the main focus
    is extended life-stage progression or movement through service systems.
  imported_boundary_note: Participant-reference wording imports an authoritative inclusion
    or exclusion boundary; it is not a verbatim source definition.

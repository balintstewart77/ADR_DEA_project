- code: 1
  canonical_label: Demographic disparities / equity tag
  owner_layer: tag
  source_layer: Cross-cutting tag
  source_status: new v3.4
  effective_status: active_current_prompt_category
  include_in_prompt: true
  include_in_owner_missing_menu: true
  owner_microdefinition: Comparisons across demographic or equality-relevant groups
    are central; socioeconomic inequality alone or routine subgroup breakdowns do
    not qualify.
  owner_reference_definition: A cross-cutting tag for projects whose research question
    centres on comparing outcomes, experiences, risks, access, or trajectories across
    demographic or equality-relevant groups. Routine subgroup breakdowns do not qualify,
    and socioeconomic or deprivation-based inequality alone is insufficient unless
    comparison across demographic or equality-relevant groups is central.
  source_dictionary_version: 1.0-rc2
  source_definition: A cross-cutting tag for projects whose research question centres
    on comparing outcomes, experiences, risks, access, or trajectories across demographic
    or equality-relevant groups.
  traceability: Reference definition combines the frozen definition with an imported
    exclusion/boundary clause approved in the 2026-07-23 addendum; inline microdefinition
    is unchanged.
  wording_origin: frozen_definition_plus_imported_exclusion_boundary_clause
  reference_definition_provenance: frozen_definition_plus_imported_exclusion_boundary_clause
  imported_boundary_source_field:
  - inclusion_rules
  - exclusion_rules
  imported_boundary_source_path:
  - taxonomy_data_dictionary.yaml::categories[layer="Cross-cutting tag",label="Demographic
    disparities / equity tag"].inclusion_rules
  - taxonomy_data_dictionary.yaml::categories[layer="Cross-cutting tag",label="Demographic
    disparities / equity tag"].exclusion_rules
  imported_boundary_source_text:
  - Assign where demographic or equality-relevant comparison is central to the research
    question, especially comparison by age, cohort, sex, gender, race, ethnicity,
    religion, disability, migrant/refugee status, nationality, or similar group characteristics.
    Use this tag for the demographic or equality-relevant comparative lens while assigning
    the substantive domain according to the outcome, system, policy area, or mechanism
    being studied. Socioeconomic comparison qualifies only where the comparison is
    made across a demographic or equality-relevant group; socioeconomic position alone
    is not sufficient. The tag can be combined with any Layer A domain and any Layer
    C purpose.
  - Do not assign merely because demographic variables are used as controls, covariates,
    sample descriptors, or routine stratifiers. Do not assign to poverty, income,
    wealth, deprivation, regional inequality, or socioeconomic-position projects where
    the comparison is not centrally across a demographic or equality-relevant group.
    Do not use this tag as a substitute for the substantive domain or analytical purpose.
  imported_boundary_note: Participant-reference wording imports an authoritative inclusion
    or exclusion boundary; it is not a verbatim source definition.
  reused_or_condensed: approved_microdefinition_with_frozen_definition_plus_imported_boundary_clause
  microdefinition_material_simplification: true
  reference_definition_material_simplification: false
  reference_definition_boundary_clause_imported: true
  review_status: approved_by_author
  reviewer: Balint Stewart
  review_date: '2026-07-23'

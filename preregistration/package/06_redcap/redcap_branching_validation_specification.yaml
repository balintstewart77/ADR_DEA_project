version: redcap-candidate-0.7
historical_versions:
  redcap-candidate-0.3:
    scratch_taxonomy_fit_codes:
      1: Fit
      2: Partial Fit
      3: No Fit
    taxonomy_issue_codes:
      1: Missing category
      2: Ambiguous/overlapping categories
      3: Too broad
      4: Too narrow
      5: Other
      6: None
    decode_only: true
    no_destructive_recode: true
forms:
- assignment_admin
- coder_declaration
- scratch_coder
- project_owner
coder_declaration:
  record_kind: 2
  frequency: one declaration record per scratch coder before formal coding
  declaration_field: cd_declaration
  nonconfirmation_note_rule: record_kind == 2 and cd_declaration == 0
  audit_record: REDCap audit trail and form-completion timestamp; no manually entered
    declaration date
scratch:
  project_record_guard: record_kind != 2 or record_kind is blank
  domain_field: sc_domains
  domain_unclear_code: 12
  domain_unclear_exclusive: true
  purpose_field: sc_purposes
  purpose_unclear_code: 8
  purpose_min: 1
  purpose_max: 2
  purpose_unclear_exclusive: true
  taxonomy_fit_codes:
    1: Fit
    2: Partial Fit
    3: No Fit
    4: Cannot assess from register entry
  taxonomy_issue_codes:
    1: Missing or inadequately represented category
    2: Ambiguous or overlapping category boundaries
    5: Other taxonomy problem
  cannot_assess_requires_sufficiency:
  - 2
  - 3
  historical_per_project_declaration:
    field: sc_blind_decl
    visible_only_when: instrument_ver == redcap-candidate-0.3
    response_mapping_unchanged: true
  required_core:
  - sc_exposure
  - sc_domains
  - sc_purposes
  - sc_covid
  - sc_equity
  - sc_sufficiency
  - sc_taxonomy_fit
  - sc_confidence
  conditional_required:
    sc_exposure_note: record_kind != 2 and sc_exposure == 1
    sc_tax_issue: sc_taxonomy_fit in [2,3]
    sc_note: sc_sufficiency in [2,3] or sc_taxonomy_fit in [2,3] or sc_confidence
      == 3
    other_taxonomy_problem_note: 5 in sc_tax_issue
  action_tags_for_live_confirmation:
    sc_domains: '@NONEOFTHEABOVE=''12'''
    sc_purposes: '@MAXCHECKED=2 @NONEOFTHEABOVE=''8'''

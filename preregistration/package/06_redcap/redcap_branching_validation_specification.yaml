  fit_codes:
    1: Fits
    2: Does not fit
    3: Unsure
  taxonomy_fit_codes:
    1: Fit
    2: Partial Fit
    3: No Fit
  taxonomy_issue_codes:
    1: Missing or inadequately represented category
    2: Ambiguous or overlapping category boundaries
    5: Other taxonomy problem
  visibility_codes:
    1: Clearly visible
    2: Partly visible
    3: Not visible
    4: Unsure
  missing_branches:
    po_miss_domains: po_miss_domain == 1
    po_miss_purposes: po_miss_purpose == 1
    po_miss_tags: po_miss_tag == 1
  conditional_note: any proposed fit != 1 or visibility != 1; any missing-label report;
    sufficiency != 1; taxonomy_fit != 1; or Other taxonomy problem selected
  contradiction_rule: Proposed-and-Fits plus missing for the same label is rejected.
  completion_rule: Every proposed-label verdict and public-entry sufficiency are complete.
neutral_assignment_id:
  pattern: ^[A-Z0-9]{8}$
  forbidden_tokens:
  - baseline
  - hard
  - reserve
  - active
  - coder
  - owner
  must_not_derive_from_hidden_id: true
completion:
  generated_fields:
  - assignment_admin_complete
  - coder_declaration_complete
  - scratch_coder_complete
  - project_owner_complete
  invalid_if_trigger_unresolved: true
administration:
  record_kind_codes:
    1: Project assignment
    2: Coder declaration
    3: Synthetic QA
  record_kind_use:
    1: formal project assignments
    2: one declaration record per coder
    3: synthetic runtime-QA records
    blank: historical candidate-0.3 records only
  record_kind_does_not_change_scientific_sample_membership: true
  sample_set_codes:
    1: Baseline
    2: Hard case
    3: Owner review
    4: Pilot
  pilot_validation_included: 0
  owner_recruitment_route_codes:
    0: Not applicable
    1: Sequence based
    2: Supplementary purposive
    3: Post-revision
  owner_sequence_target_unique_records: 50
  owner_sequence_minimum_viable_unique_records: 25
  owner_supplementary_invitation_maximum: 10
  owner_data_collection_close_day: 42
  no_fixed_owner_reserve: true

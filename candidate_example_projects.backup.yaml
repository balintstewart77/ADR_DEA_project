_meta:
  note: 'Candidate example projects extracted from the taxonomy data dictionary. These are drafted, UNVALIDATED worked classifications — initially created as a thinking aid while developing the ontology. They are NOT authoritative classifications and are NOT used to generate the classifier prompt. They are raw material for two later, separate pieces of work: the design of the validation-study sample, and (post-validation) the construction of a gold-standard verified example set. This file is a mixed set of drafted candidates of varying difficulty; it is not a curated hard-case set.'

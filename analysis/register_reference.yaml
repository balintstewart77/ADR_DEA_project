linked_products_rule:
  rule: >
    Record linkage is derived from linked-product component domains. A product
    with components from no recognised linked product is "No record linkage"; a
    product whose component-domain union contains one domain is within-domain;
    a product whose union contains two or more domains is cross-domain.
    linkage_span is derived from component_domains and is never stored in this
    reference. A project's record_linkage takes the maximum span of its
    individually matched products: cross-domain when at least one matched
    product is itself cross-domain, within-domain when products matched but
    none is cross-domain. Using several single-domain products from different
    domains is NOT cross-domain linkage; the span is a property of each linked
    product, never a union across the project's portfolio (per-product
    aggregation, reference 0.4.8).
  lens_vs_object_rule: >
    A linked component contributes the "Migration & Demographics" domain only
    when the dataset's substantive origin is population or demography, such as
    Census as a population source, not when a dataset merely carries
    demographic fields. NPD ethnicity or free-school-meal attributes are
    attributes of education records, not a separate demographic component.
  worked_edge_cases:
    - >
      GRADE combines Ofqual, NPD, and UCAS components, but NPD demographic
      fields are attributes of education records. Its component-domain union is
      Education & Skills only, so the derived span is within-domain.
    - >
      MoJ Data First is scoped to the public-register Data First justice
      extracts listed here. MoJ-DfE linkage is excluded because it uses a
      different legal gateway and is outside the public-register scope here.
    - >
      WED is not uniformly one linkage span. ASHE Longitudinal and ASHE linked
      to PAYE/Self-Assessment are labour-market components; ASHE linked to
      Census 2011 combines labour-market and population-demography origins.
    - >
      GUIE mirrors the GRADE edge case in the opposite direction: Census is a
      population-origin source, so the education-Census product is cross-domain.

dataset_collection_method_rule:
  rule: >
    Collection method is a provenance fact, by design, single-label. Each
    dataset gets exactly one of survey or administrative. Survey means collected
    through a survey instrument or survey return, including employer survey
    forms. Administrative means derived from administrative, register, service,
    or operational records.
  edge_case_rule: >
    ASHE is survey by design even though sampled from PAYE administrative
    records, because it is collected through employer survey returns.
  worked_edge_cases:
    - "Census -> survey: survey instrument by design."
    - "ASHE and ASHE Longitudinal -> survey: employer survey-return design."
    - "Understanding Society and Millennium Cohort Study -> survey."
    - "LEO and ECHILD -> administrative: linked administrative products."
    - "Birth and death registrations -> administrative: vital-event registers."
    - >
      Census-based longitudinal linked-record datasets (e.g. ONS Longitudinal
      Study) -> survey: classified by primary content, not assembly. Core records
      from Census make the collection method survey; record linkage is a
      structuring mechanism (creating longitudinal structure) and does not make
      the dataset administrative; supplementary linked administrative records
      (deaths, cancer registrations) do not change the primary collection method.
      Record linkage by itself does not make a dataset administrative — the
      collection method follows the source of the core content.
  parked_schema_question: >
    Should collection_method ever be multi-valued for genuinely mixed-source
    products (e.g. Census-cored linked to admin health records)? Current policy:
    single value by primary content; mixed nature documented in rationale text.
    Parked for discussion with Jo alongside the CIS unit-rule (sampling-frame vs
    lowest-grain) question. Do not change the single-label rule without that
    discussion.

dataset_temporal_structure_rule:
  rule: >
    Temporal structure is a time-structure fact, single-label, classified by the
    dataset producer's design, weighting, and release for use. Each dataset gets
    exactly one of cross-sectional or longitudinal. Longitudinal means the
    released dataset is designed and weighted to follow the same units
    (persons, households, firms, or equivalent records) over time.
    Cross-sectional means a point-in-time release or repeated fresh-extract
    release.
  construction_rule: >
    Classify by producer design, weighting, and release, not by the raw sampling
    frame or by what could be constructed from the data. A dataset whose
    sampling frame permits longitudinal linkage but which is produced and
    weighted cross-sectionally is cross-sectional; a longitudinal version exists
    as a distinct entry only when the longitudinal construction and weighting
    has actually been done.
  aggregate_indicator_limitation: >
    Aggregate indicators and national or area-level time-series outputs such as
    CPI, GVA, PPI, and Capital Stock are not longitudinal under this facet. They
    may contain repeated time points, and sometimes repeated areas, industries,
    sectors, or product categories, but they do not follow individual people,
    households, businesses, or cases as units over time. Classify them as
    cross-sectional aggregate statistical outputs unless the released dataset is
    explicitly structured as a longitudinal unit-level panel.
  retired_category_note: >
    The former cohort category is retired because it conflated collection method
    with temporal structure and misnamed longitudinality. Business panels are
    longitudinal but are not cohort studies.
  worked_edge_cases:
    - "Census -> cross-sectional: population enumeration released as a cross-section."
    - "Understanding Society -> longitudinal: designed household panel."
    - "Millennium Cohort Study -> longitudinal: designed birth cohort."
    - "Base ASHE -> cross-sectional: ONS weights and releases it cross-sectionally despite the recurring NINo frame."
    - "ASHE Longitudinal -> longitudinal: the longitudinal construction and weighting have been applied."
    - "Decision Maker Panel and Longitudinal Small Business Survey -> longitudinal: business panels."
    - "Birth and death registrations -> cross-sectional: continuous event registers, typically extracted as event records."

dataset_unit_rule:
  rule: >
    The unit is the unit the dataset is structured or collected around, not the
    unit a project analyses, and the rule is applied symmetrically. Each dataset
    gets exactly one of individual, household, business, or area.
  worked_edge_cases:
    - >
      Understanding Society -> household: it is a household panel even though
      individuals are often analysed.
    - >
      Census -> individual: it enumerates persons; household is a grouping. This
      is a deliberate call that differs from Understanding Society because
      Census is a population enumeration, not a household panel.
    - "ASHE -> individual: job/employee-centric, though employer-returned."
    - "Trade and customs sources -> business."
    - "Death and birth registrations -> individual: vital events are person-level."
    - "LEO and person-linked products -> individual."
    - >
      Annual gas and electricity consumption at meter level -> area: the actual
      structural unit is property/meter, which is outside the current unit
      vocabulary, so area is the nearest fallback.
    - >
      Prices Survey Microdata -> business: the actual unit is price
      quote/item/outlet, which is outside the current unit vocabulary; outlets
      and businesses are core collection units, so business is the nearest
      fallback.
    - >
      Earnings and Employees Study (EES) 2011 - Northern Ireland -> individual:
      NI-specific ASHE 2011 linkage to Census and Capital Value data, kept
      distinct from WED / ASHE-Census England and Wales; employee is the best
      available unit.
    - >
      UK Gross Value Added -> area: an aggregate statistical output/time series
      rather than a microdataset, with geography/economy-level structure.
  aggregate_indicator_limitation: >
    Aggregate indicators and national time-series outputs (CPI, GVA, PPI, and
    Capital Stock) do not fit the unit-based deterministic facets cleanly. They
    have no unit of observation in the four-value vocabulary, so they are mapped
    to the closest available value (area for CPI/GVA, business for PPI/Capital
    Stock) and classified as cross-sectional because they are not unit-following
    panels. This is a known boundary of the unit-based schema rather than a new
    aggregate/time-series facet value for a small number of cases.
  cross_facet_consistency_note: >
    Census appears in three facets as survey, individual, and
    Migration & Demographics as a linkage component. These rulings are mutually
    consistent: Census is a population survey enumerating individuals whose
    substantive object is demography.

dataset_lookup_review_notes:
  - raw: "Research and Development Expenditures and Subsidies"
    action: "review_manually"
    rationale: >
      Likely incomplete or derived. It could relate to BERD plus subsidy/admin
      data, but should not be auto-mapped without source context.
  - raw: "Firm Productivity"
    action: "review_manually"
    rationale: >
      Looks like an analytical output or derived measure rather than a dataset
      title. Do not auto-map to ABS/ABI/IDBR without source context.
  - raw: "Employment Creation and Survival"
    action: "review_manually"
    rationale: >
      Looks like a derived business-demography measure rather than a dataset
      title. Do not auto-map to BSD/LBD/IDBR without source context.
  - raw: "Foreign Direct Investment Index"
    action: "review_manually"
    rationale: >
      Index wording suggests an output/indicator rather than the source FDI
      survey. Do not auto-map unless project text confirms it means the Annual
      Foreign Direct Investment Survey.
  - raw: "Racial Disparity Audit"
    action: "do_not_map_as_dataset"
    rationale: >
      Not a single dataset; closer to a government audit/dashboard/publication
      drawing on multiple sources. Needs the underlying dataset title.
  - raw: "Bespoke National Council for Voluntary Organisations"
    action: "do_not_map_as_dataset"
    rationale: >
      Incomplete title naming an organisation/source rather than a dataset.
      Needs the actual NCVO dataset name.

researcher_sector_rule:
  rule: >
    Researcher sector is structural/legal status, not behaviour. Classify each
    organisation, then derive a project's researcher_sectors as the union of its
    researchers' organisation sectors.
  priority_procedure:
    - "UK HEI or institute constituted within one -> academic."
    - "Public body, including departments, devolved/local government, NHS, ALBs, NDPBs, regulators, and the central bank -> government."
    - "Registered charity, foundation, trust, CIC, or not-for-profit NGO -> third-sector, including research foundations and think tanks."
    - "For-profit company -> commercial."
    - "Genuinely uncertain -> unclassified; do not guess."
  worked_edge_cases:
    - "Nesta -> third-sector: registered charity, regardless of commercial behaviour."
    - "AQA Education -> third-sector: registered charity, regardless of commercial behaviour."
    - "IFS and comparable think tanks -> third-sector: charities, regardless of academic behaviour."
    - "Bank of England -> government: public body, operational independence does not make it commercial."
    - "ALBs, regulators, and ONS -> government."
    - "University spin-out -> academic if the HEI; commercial if the for-profit subsidiary."
    - >
      Tech City UK -> government: use the historical register entity as a
      government-backed tech-sector programme/public-sector machinery, despite
      the later Tech Nation company-limited-by-guarantee legal form.
    - >
      Office of the Victims' Commissioner for England and Wales -> government:
      an independent public office working with the Ministry of Justice and
      criminal justice agencies remains public-sector despite operational
      independence.
    - >
      Centre for Healthcare Evaluation, Device Assessment, and Research (CEDAR)
      -> unclassified: the acronym can be resolved, but the register string
      does not by itself identify a host/legal body clearly enough to assign
      academic or government without guessing.


  - canonical: "Public Health Research Database"
    aliases:
      - "Public Health Research Database"
      - "HES and Mortality"
    collection_method: "administrative"
    temporal_structure: "longitudinal"
    unit_of_observation: "individual"
    notes: "Health administrative records. Temporal is longitudinal: HES follows patients through hospital episodes over time, with mortality records linked to capture subsequent death events; the linked product enables person-level health analysis across episodes and outcomes. Distinct from the Census-cored PHDA products (Linked Census/HES/Mortality) — PHRD alias 'HES and Mortality' is the non-Census variant where HES is the backbone, making it administrative."
    temporal_source: "https://digital.nhs.uk/data-and-information/data-tools-and-services/data-services/linked-hes-ons-mortality-data"

  - canonical: "Linked Census, HES and Mortality Data"
    aliases:
      - "Linked Census, HES and Mortality Data"
    collection_method: "survey"
    temporal_structure: "longitudinal"
    unit_of_observation: "individual"
    notes: "ONS PHDA family: Census 2011 respondents form the base population, with HES hospital episodes, mortality records, and GP data linked onto each Census record. Temporal is longitudinal: the linkage enables person-level health analysis from Census 2011 forward through subsequent hospital episodes and death events. Collection method is survey: Census-cored linked-record product — primary content is the Census (survey); record linkage is a structuring mechanism, and the linked administrative mortality/health records (HES, death/mortality data) are supplementary linked sources that do not change the primary collection method. Same principle as the ONS Longitudinal Study."
    temporal_source: "https://ons.metadata.works/browser/dataset?id=292"
    collection_method_source: "https://ons.metadata.works/browser/dataset?id=292"


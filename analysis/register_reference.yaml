reference_version: "0.5.4"

adr_england_flagship_source: &adr_england_flagship_source "https://www.adruk.org/data-access/flagship-datasets/"
adr_england_flagship_note: &adr_england_flagship_note >
  ADR England flagship collection, based on the 2023 ADR England brochure
  framing (LEO, ECHILD, Growing Up in England, GRADE, ASHE-linked, Data First;
  AD|ARC then under construction). Growing Up in England is included on this
  2023 basis though it is not in the current 24-item ADR UK flagship catalogue.
  This flag denotes the ADR *England* collection specifically — NOT the full
  UK-wide ADR UK flagship catalogue. ADR UK flagship datasets for Northern
  Ireland, Scotland and Wales (e.g. Business Data for Research NI, Education
  Outcomes Linkage NI, Earnings and Employees Study NI, Scottish LEO, Looked
  After Children datasets, RAPID, CRCS) are NOT flagged here: they are genuine
  ADR UK flagships but not England-collection members, and most have thin or no
  DEA-register presence (the register observes DEA-gateway use, which is
  England-weighted). They appear in 'Other linked datasets'.
meta_principle: >
  Each entity is classified by an intrinsic, structural, objective property,
  never by project use or organisational behaviour. Linkage is classified by
  the structural origin of the linked components, not by how a project frames
  them. Dataset collection method is classified by collection design. Dataset
  temporal structure is classified by producer design, weighting, and release,
  not by project use, the raw sampling frame, or what could be constructed from
  the data. Unit of observation is the unit the dataset is structured or
  collected around, not the unit a project analyses. Researcher sector is
  classified by legal or constitutional status, not behaviour.

canonical_key_policy: >
  Dataset entries are parsed with dashboard.dataset_normalisation and matched
  after normalise_dataset_name. Where the existing normaliser exposes a reviewed
  family through dataset_family_for, this reference may use that family as the
  canonical key to avoid duplicating equivalent canonical variants such as
  Census years, ASHE components, Labour Force Survey files, Data First extracts,
  GUIE waves, and AD|ARC phases. Researcher organisations are parsed with
  dashboard.institution_normalisation.parse_institutions and matched on its
  canonical institution string.

processing_environment_rule:
  rule: >
    Processing-environment values are canonicalised for display and grouping
    from reviewed register aliases. This is a grouping correction for the
    existing Secure Research Service / TRE field only; it must not affect
    dataset facets, researcher sectors, LLM classifications, or record-linkage
    derivation.
  count_basis: >
    Counts use cleaned DEA register project records after the legal-basis filter
    and duplicate policy, not raw source rows. Non-DEA SRSA rows are excluded
    before this alias grouping is applied.
  adjudicated_decisions:
    - >
      Bare "SRS" is the ONS Secure Research Service and is folded into the ONS
      SRS group.
    - >
      Integrated Data Service is the ONS IDS, a distinct newer environment; it
      is intentionally not merged into the ONS SRS group.
    - >
      SAIL Databank is the display name; do not expand SAIL to Secure
      Anonymised Information Linkage in dashboard labels.


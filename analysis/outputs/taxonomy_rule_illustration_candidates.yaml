- label: "Unclear from Register Entry"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Register entries where the title is a broad programme name or acronym and the dataset
        field is missing or uninformative.
      rationale: >-
        This illustrates uncertainty because neither available register field supports a
        defensible substantive domain. "Unclear from Register Entry" covers cases where the
        available register text genuinely does not determine the category — this includes both
        genuinely ambiguous research and register entries too sparse or damaged to interpret; it
        is a statement about the register entry, not a judgement that the research is itself
        unclassifiable.
      evidence:
        - project_id: "2023/214"
          title: "Better outcomes through linked data - BOLD"
          datasets_used: "[missing or blank in cleaned register]"
      caution: >-
        Only one clearly missing cleaned dataset field was found, so this is a feasibility
        example rather than a recurring pattern.
    - text: >-
        Register entries using broad public-value language with only generic dataset information
        and no identifiable policy or sector object.
      rationale: >-
        The category is a fallback for insufficient evidence, not a substantive domain in its
        own right.
      evidence:
        - project_id: "2024/019"
          title: "ADR Wales Social Justice"
          datasets_used: "SAIL Databank Databank: Census 2021"
      caution: >-
        The broad register wording may resolve to a substantive domain in the full proposal;
        keep as an ambiguity example only.
  candidate_counterexamples:
    - text: >-
        Acronym-bearing or branded entries where the surrounding wording still identifies a
        justice, health, education, labour, or other substantive object.
      rationale: >-
        An opaque project name is not enough for this fallback label when other register text
        resolves the domain. A service-system purpose can be considered separately, but the
        domain should follow the substantive object visible in the register text.
      instead_consider:
        - "Crime & Justice"
      evidence:
        - project_id: "2025/007"
          title: "Better Outcomes Through Linked Data (BOLD) Reducing Reoffending Pilot: Families & Intergenerational Offending"
          datasets_used: "SAIL Databank Databank: Census 2011"
- label: "Single-Dataset"
  layer: "Layer B -- linkage"
  candidate_examples:
    - text: >-
        A register entry listing one standalone data source from one provider, with no evidence
        of linkage or multi-source construction.
      rationale: >-
        This illustrates the linkage mode because the dataset field supports one coherent source
        rather than multiple datasets or a pre-linked product.
      evidence:
        - project_id: "2019/004"
          title: "The changing nature of the HR and training practitioner profession"
          datasets_used: "Office for National Statistics: Annual Population Survey"
    - text: >-
        A register entry listing one internally coherent survey or data product where component
        sources are not separately identified.
      rationale: >-
        The non-obvious boundary is that a single named data product can remain Single-Dataset
        when it is not described as a linked cross-source product.
      evidence:
        - project_id: "2019/006"
          title: "Analysis of victimisation data from the Crime Survey for England and Wales"
          datasets_used: "Office for National Statistics: Crime Survey for England and Wales"
  candidate_counterexamples:
    - text: >-
        A single listed product or named pair whose component sources are known to combine
        domains, such as education-health or census-earnings linkage.
      rationale: >-
        The register may show one product name, but linkage mode depends on the component
        sources when a product is pre-linked.
      instead_consider:
        - "Cross-Domain Linkage"
      evidence:
        - project_id: "2021/107"
          title: "Assessing Equality Pay Gaps in Northern Ireland"
          datasets_used: "Office for National Statistics / | Northern Ireland Statistics and Research Agency: Linked NI Census-ASHE"
        - project_id: "2025/184"
          title: "How do mental and physical health problems contribute to inequalities in persistent school absence?A mediation analysis using Education and Child Health Insights from Linked Data (ECHILD)."

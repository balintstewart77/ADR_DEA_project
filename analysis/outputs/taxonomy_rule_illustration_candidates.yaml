- label: "Policy Evaluation / Impact Analysis"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Studies evaluating the effect, impact, implementation, or consequences of a named
        policy, programme, fund, levy, scheme, reform, or intervention.
      rationale: >-
        This purpose is illustrated when the exposure is a deliberate action or institutional
        change.
      evidence:
        - project_id: "2019/013"
          title: "TechNation programme evaluation"
          datasets_used: "Office for National Statistics: Business Structure Database"
        - project_id: "2020/059"
          title: "An evaluation of the Apprenticeships Levy using firm level data"
          datasets_used: "Department for Education: Employer Skills Surveys"
    - text: >-
        Studies comparing outcomes before, after, or around a designed policy or programme to
        understand its effects.
      rationale: >-
        The analytical operation is evaluation of an intentional intervention, regardless of
        whether the domain is business, labour, education, or public finance. The domain may be

- label: "Descriptive Monitoring"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Studies measuring levels, patterns, profiles, distributions, prevalence,
        characteristics, or trends without testing an exposure-outcome relationship.
      rationale: >-
        This purpose is illustrated by describing what exists or how it varies, rather than
        estimating the effect of one factor on another.
      evidence:
        - project_id: "2019/007"
          title: "Thriving Places index indicators of wellbeing at local authority level"
          datasets_used: "Office for National Statistics: Labour Force Survey & Annual Population Survey"
        - project_id: "2022/013"
          title: "Trends in Cardiovascular diseases subtypes in England and Wales from 2001 to 2019"
          datasets_used: "Office for National Statistics: Death Registrations, England and Wales"
    - text: >-
        Studies estimating the scale, distribution, or composition of a phenomenon so that
        patterns can be described across places, groups, or time.
      rationale: >-
        This illustrates the purpose because the analytical operation is to characterise what is
        happening and how it varies, rather than to test whether an exposure causes an outcome
        or to evaluate a named intervention.
      evidence:
        - project_id: "2019/006"
          title: "Analysis of victimisation data from the Crime Survey for England and Wales"
          datasets_used: "Office for National Statistics: Crime Survey for England and Wales"
        - project_id: "2021/066"
          title: "Patterns of spending through retirement"
          datasets_used: "Office for National Statistics: Living Costs and Food Survey"
  candidate_counterexamples:
    - text: >-
        Studies designed to estimate whether a condition, exposure, or characteristic is
        associated with a downstream outcome.
      rationale: >-
        That design goes beyond description because it links X to Y.
      instead_consider:
        - "Outcome Tracking"
      evidence:
        - project_id: "2019/005"
          title: "Measuring the impact of hearing loss on well-being"
          datasets_used: "Office for National Statistics: Annual Population Survey"
        - project_id: "2020/035"
          title: "An examination of the relationship between the population disclosing domestic violence to the Intimate Violence Module and the Victim Module of the CSEW"
          datasets_used: "Office for National Statistics: Crime Survey for England and Wales"
      caution: >-
        Impact language can be loose in titles; full design text should be checked before using
        as a counterexample.
- label: "Outcome Tracking"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Studies linking a naturally occurring condition, characteristic, exposure, event, or
        circumstance to a downstream outcome.
      rationale: >-
        This purpose is illustrated when the analysis asks whether or how X is associated with Y
        and X is not a named intervention.
      evidence:
        - project_id: "2019/005"
          title: "Measuring the impact of hearing loss on well-being"
          datasets_used: "Office for National Statistics: Annual Population Survey"
        - project_id: "2022/017"
          title: "The link between characteristics of school pupils and labour market outcomes"
          datasets_used: "DfE, DWP and HMRC: LEO via SRS Iteration 1 Standard Extract"
    - text: >-
        Studies examining determinants, consequences, or relationships between social, health,
        economic, educational, business, or justice phenomena.
      rationale: >-
        The analytical operation is tracing an exposure-outcome relationship rather than simply
        profiling a phenomenon.
      evidence:
        - project_id: "2020/023"
          title: "The determinants of performance-pay utilisation by firms and its consequences for firm behaviour, performance, and employee outcomes"
          datasets_used: "Office for National Statistics: Business Structure Database, Annual Business Survey, Workplace Employment Relations Survey, International Trade in Services, Annual Survey of Hours and Earnings & Wealth and Assets Survey"
        - project_id: "2020/030"
          title: "Examining the relationship between engaging in design and exporting"
          datasets_used: "Department for Business, Energy and Industrial Strategy: UK Innovation Survey"
  candidate_counterexamples:
    - text: >-
        Studies estimating the effect of a named policy, programme, scheme, fund, levy, reform,
        or intervention.
      rationale: >-
        When the exposure is a deliberate intervention, the design belongs to policy evaluation
        rather than generic outcome tracking. The named-intervention boundary itself has genuine
        hard cases: studies of broad statutory parameters such as minimum-wage levels, tax
        thresholds, or benefit rates can be framed either as evaluating a named policy or as
        analysing a naturally occurring change, and such cases require the author's judgement
        about how the project frames the exposure.
      instead_consider:
        - "Policy Evaluation / Impact Analysis"
      evidence:
        - project_id: "2020/021"
          title: "The impact of the National Living Wage on Employment, Hours, Earnings and Household Income"
          datasets_used: "Office for National Statistics: Annual Population Survey & Annual Survey of Hours and Earnings"
        - project_id: "2020/024"
          title: "Assessing the impact of UK Enterprise Zones"
          datasets_used: "Office for National Statistics: Annual Respondents Database, Annual Business Survey, Annual Survey of Hours and Earnings, Business Structure Database & Quarterly Labour Force Survey"
      caution: >-
        Some policy titles use broad impact language without a rigorous evaluative design;
        review before using in the dictionary.
- label: "Life-Course / Trajectory Analysis"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Studies following individuals, households, firms, or cases through stages, transitions,
        pathways, or trajectories over an extended period.
      rationale: >-
        This purpose is illustrated by movement and progression across time, not just the
        presence of longitudinal data.
      evidence:
        - project_id: "2021/074"
          title: "Identifying effective post-16 education pathways to Level 2 and Level 3 achievement, for learners with a 3 or below in Maths and/or English at KS4"
          datasets_used: "DfE, DWP and HMRC: LEO via SRS Iteration 1 Standard Extract"

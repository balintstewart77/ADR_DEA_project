        evaluative design.
      evidence:
        - project_id: "2020/002"
          title: "Evaluation of the Energy Entrepreneurs Fund"
          datasets_used: "Office for National Statistics: Business Enterprise Research and Development, Business Structure Database, Annual Business Survey & Annual Survey of Hours and Earnings"
        - project_id: "2020/024"
          title: "Assessing the impact of UK Enterprise Zones"
          datasets_used: "Office for National Statistics: Annual Respondents Database, Annual Business Survey, Annual Survey of Hours and Earnings, Business Structure Database & Quarterly Labour Force Survey"
  candidate_counterexamples:
    - text: >-
        Studies of naturally occurring conditions or characteristics, such as illness, debt,
        housing conditions, or family context.
      rationale: >-
        These may involve outcome analysis, but they are not policy evaluation unless a named
        intervention is the exposure.
      instead_consider:
        - "Outcome Tracking"
      evidence:
        - project_id: "2019/005"
          title: "Measuring the impact of hearing loss on well-being"
          datasets_used: "Office for National Statistics: Annual Population Survey"
        - project_id: "2020/017"
          title: "Subjective wellbeing impacts of debt and debt-related factors"
          datasets_used: "Office for National Statistics: Wealth and Assets Survey"
      caution: >-
        If a title hides a named intervention in the full proposal, the purpose may need
        re-review.
- label: "Risk Prediction / Early Identification"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Studies building or using a risk score, prediction model, screening approach, or
        early-identification method for future or emerging adverse outcomes.
      rationale: >-
        This purpose is illustrated by prospective identification or prediction, not by risk
        vocabulary alone.
      evidence:
        - project_id: "2020/056"
          title: "Factors Predicting Adherence Stay at Home Guidance During COVID-19 Pandemic in the United Kingdom"
          datasets_used: "Office for National Statistics: Coronavirus and the social impacts on Great Britain"
        - project_id: "2025/032"
          title: "Risk factors for severe mental health outcomes among young people: a national cohort study"
          datasets_used: "NHS; DfE: Education and Child Health Insights from Linked Data - England"
    - text: >-
        Studies estimating elevated likelihood of future harm, crisis, service need,
        perpetration, victimisation, or clinical/event occurrence for individuals or groups.
      rationale: >-
        The analytical operation is to identify who or where is at heightened risk before or as
        the adverse outcome emerges.
      evidence:
        - project_id: "2024/089"
          title: "Risk of violence perpetration and victimisation among individuals with traumatic brain injury: a longitudinal data linkage study"
          datasets_used: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, | MoJ Data First Crown court defendant case level dataset, | MoJ Data First prisoner custodial journey dataset - Wales, | MoJ Data First Probation dataset | SAIL Databank Databank: 2011 Census Data Welsh residents, | SAIL Databank Databank: 2021 Census Data ..."
        - project_id: "2019/021"
          title: "Social and Economic Predictors of the severe mental disorders, the SEP-MD study. Analysis of linked data from southeast London, UK"
          datasets_used: "Office for National Statistics: Census 2011 & Death Registrations"
      caution: >-
        Some risk-factor studies are conventional outcome tracking; review whether a predictive
        or screening aim is explicit.
  candidate_counterexamples:
    - text: >-
        Studies estimating associations between an exposure and an outcome without building a
        prediction, screening, or early-identification tool.
      rationale: >-
        Risk factors can be analysed as outcome tracking when the design does not aim to predict
        or identify elevated risk.
      instead_consider:
        - "Outcome Tracking"
      evidence:
        - project_id: "2020/035"
          title: "An examination of the relationship between the population disclosing domestic violence to the Intimate Violence Module and the Victim Module of the CSEW"
          datasets_used: "Office for National Statistics: Crime Survey for England and Wales"
        - project_id: "2019/020"
          title: "Housing, family and environmental risk factors for hospital admissions in children"
          datasets_used: "Office for National Statistics: Death Registrations & Census 2011: Household Sample"
      caution: >-
        The phrase risk factors can be ambiguous; retain as a boundary candidate only after
        design review.
- label: "Methodological / Infrastructure Research"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Studies developing, testing, validating, improving, or documenting methods, measures,
        data quality, classifications, datasets, or linkage approaches.
      rationale: >-
        This purpose is illustrated when the methodological or infrastructural contribution is
        the main analytical operation. A substantive domain can still be assigned separately;
        this purpose captures the method or infrastructure contribution.
      evidence:
        - project_id: "2021/111"
          title: "Re-counting crime: New methods to improve the accuracy of estimates of crime"
          datasets_used: "Office for National Statistics: Crime Survey for England and Wales, 2011 Census: Aggregate Data"
        - project_id: "2025/242"
          title: "Reviewing our Measurement Framework and conducting a data quality review to ensure that our data sources are of a high quality and all protected characteristics are available for analysis ahead of the next Statutory report."
          datasets_used: "Office for National Statistics: Labour Force Survey, Death Registration Data, Annual Population Survey - UK, Annual Survey of Hours and Earnings - UK, Crime Survey for England and Wales, Opinions and Lifestyle Survey"
        - project_id: "2025/077"
          title: "Mode effects and data quality of occupational coding in UK household surveys"
          datasets_used: "Office for National Statistics: Census Non Response Link Study 2021 England and Wales indexed"
    - text: >-
        Studies whose purpose is to shape, assess, or demonstrate the value of a data asset,
        measurement framework, or classification system.
      rationale: >-
        The work is about producing better research infrastructure rather than primarily
        answering a substantive policy question.
      evidence:
        - project_id: "2021/035"
          title: "Shaping, testing and demonstrating the value of the Growing up in England wave 1 dataset: Roma, Gypsy and Traveller children case study"
          datasets_used: "Office for National Statistics: Growing Up in England Wave 1"
        - project_id: "2024/189"
          title: "Enhancing Approaches to Night-Time Economy Classifications: Initial Data-Driven Insights"
          datasets_used: "Office for National Statistics: Annual Business Survey in Great Britain, Business Register Employment Survey, Business Structure Database in the UK, Labour Force Survey, Longitudinal Business Database, Standard Industrial Classification and Occupational lookup, UK small area gross value added estimates, Annual Survey of Hours and Earnings, Visa, O2 mobile network operator travel and location data UK"
        - project_id: "2025/121"
          title: "Sense-checking a reconstructed ONS Longitudinal Study (LS) data dictionary"
          datasets_used: "Office for National Statistics: Longitudinal Study 1971, 1981, 1991, 2001, 2011, and 2021"
  candidate_counterexamples:
    - text: >-
        Substantive studies that use administrative data, linkage, modelling, or advanced
        methods only as tools to answer another research question.
      rationale: >-
        Methods are instrumental in many projects; this purpose requires method or
        infrastructure development to be central.
      instead_consider:
        - "Outcome Tracking"
        - "Service Interaction / Systems Analysis"
        - "Policy Evaluation / Impact Analysis"
      evidence:
        - project_id: "2025/185"
          title: "High-intensity Emergency department use and mental health in young people (aged 10-25): a longitudinal data linkage study using administrative data from England"
          datasets_used: "NHS; DfE: Education and Child Health Insights from Linked Data Research Database - England"
        - project_id: "2020/012"
          title: "Wage progression and firm productivity"
          datasets_used: "Office for National Statistics: Annual Business Inquiry, Annual Inquiry into Foreign Direct Investment, Annual Respondents DatabaseX, Annual Respondents Database, Annual Survey of Hours and Earnings, Business Expenditure on Research and Development, Business Impact of COVID-19 Survey, Business Register Employment Survey, Business Stru ..."
      caution: >-
        The full proposal may contain a methodological contribution not visible in title/dataset
        fields.
- label: "Unclear from Register Entry"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-
        Register entries with broad acronyms or programme names and no visible signal of
        monitoring, evaluation, prediction, pathways, outcome tracking, or method development.
      rationale: >-
        This fallback purpose is illustrated when the available title and dataset text do not
        reveal the analytical operation. "Unclear from Register Entry" covers cases where the
        available register text genuinely does not determine the category — this includes both
        genuinely ambiguous research and register entries too sparse or damaged to interpret; it
        is a statement about the register entry, not a judgement that the research is itself
        unclassifiable.
      evidence:
        - project_id: "2023/214"
          title: "Better outcomes through linked data - BOLD"
          datasets_used: "[missing or blank in cleaned register]"
      caution: >-
        Few feasible examples were found; use only to illustrate register-entry insufficiency.
    - text: >-
        Register entries whose substantive area may be inferable but whose study design remains
        opaque from the available register fields.
      rationale: >-
        Purpose is distinct from domain: the category applies only when the analytical operation
        cannot be inferred.
      evidence:
        - project_id: "2024/019"
          title: "ADR Wales Social Justice"
          datasets_used: "SAIL Databank Databank: Census 2021"
      caution: >-
        Full project text would likely resolve the purpose; candidate illustrates register-entry
        insufficiency only.
  candidate_counterexamples:
    - text: >-
        Opaque or branded entries that still contain clear evaluation, impact, prediction,
        pathway, monitoring, or method-development wording.
      rationale: >-
        A branded name does not make purpose unclear when the title also reveals the analytical
        design.
      instead_consider:
        - "Policy Evaluation / Impact Analysis"
      evidence:
        - project_id: "2019/013"
          title: "TechNation programme evaluation"
          datasets_used: "Office for National Statistics: Business Structure Database"
        - project_id: "2020/002"
          title: "Evaluation of the Energy Entrepreneurs Fund"
          datasets_used: "Office for National Statistics: Business Enterprise Research and Development, Business Structure Database, Annual Business Survey & Annual Survey of Hours and Earnings"
      caution: >-
        Branded programme names can still require author review if evaluation is used loosely.
- label: "Demographic disparities / equity tag"
  layer: "Cross-cutting tag"
  candidate_examples:
    - text: >-
        Studies centrally comparing outcomes, risks, experiences, access, or trajectories across
        age, cohort, sex, gender, race, ethnicity, religion, disability, migrant/refugee status,
        or nationality groups.
      rationale: >-
        The tag is illustrated when comparison across these demographic or equality-relevant
        groups is part of the research question, not merely a control variable or sample
        descriptor. The substantive domain should still be recorded separately; the tag is not a
        substitute for the domain.
      evidence:
        - project_id: "2021/063"
          title: "Gender Pay Gap"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings, Business Structure Database & Annual Business Survey"
        - project_id: "2021/178"
          title: "Unpacking the disability employment gap"
          datasets_used: "Office for National Statistics: Annual Population Survey (APS) | Office for National Statistics: Annual Population Survey Household | Department for Business, Energy and Industrial Strategy: Workplace Employee Relations Survey | Understanding Society: Waves 1-10 and Harmonised BHPS: Waves 1-18"
        - project_id: "2022/024"
          title: "Ethnic disparities in infant mortality"
          datasets_used: "Office for National Statistics: Infant Mortality linkage of 2011 Census, Births and Deaths"
    - text: >-
        Studies examining inequalities in a substantive domain through one or more of the
        taxonomy's demographic or equality-relevant comparison dimensions.
      rationale: >-
        The tag captures the comparative lens across age, cohort, sex, gender, race, ethnicity,
        religion, disability, migrant/refugee status, or nationality, while the domain captures
        what outcome or system is being studied.
      evidence:
        - project_id: "2021/041"
          title: "Ethnic inequalities in the Criminal Justice System"
          datasets_used: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, MoJ Data First Linked Criminal Courts defendant case level dataset & MoJ Data First magistrates' court defendant case level dataset"
        - project_id: "2023/058"
          title: "Differences in careers by ethnicity, nationality, and social class."
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings linked to 2011 Census - England and Wales"
        - project_id: "2022/090"
          title: "Reassessing ethnic disparities in sentencing using different measures of offenders' ethnicity"
          datasets_used: "Ministry of Justice: MoJ Data First Crown Court Defendant Case Level Dataset, MoJ Data First Magistrates' Court Defendant Case Level Dataset - England and Wales"
  candidate_counterexamples:
    - text: >-
        Studies of socioeconomic inequality, household debt, cost-of-living, deprivation, or
        regional disadvantage without comparison across a demographic or equality-relevant
        group.
      rationale: >-
        Socioeconomic or place-based inequality alone is not the demographic-disparities tag
        unless the comparison is across demographic or equality-relevant groups.
      instead_consider:
        - "Poverty, Wealth & Living Standards"
      evidence:
        - project_id: "2021/008"
          title: "Income Inequality"
          datasets_used: "Office for National Statistics: Annual Population Survey - Person & Households, Annual Survey of Hours and Earnings"
        - project_id: "2025/205"
          title: "Cost of Living Crisis in Rural Northern Ireland"
          datasets_used: "Office for National Statistics: Business Register Employment Survey - UK | Living Costs and Food Survey - UK | Labour Force Survey Household - UK | Consumer and Retail Price Index - UK | Annual Survey of Hours and Earnings Longitudinal - UK | Annual Population Survey - UK"
      caution: >-
        If the full project compares by age, cohort, sex, gender, race, ethnicity, religion,
        disability, migrant/refugee status, or nationality, the tag may still apply.

          title: "Using linked Magistrates and Crown Court data to explore defendant appearance over time: specialisation, escalation or de-escalation?"
          datasets_used: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, MoJ Data First Linked Criminal Courts defendant case level dataset & MoJ Data First magistrates' court defendant case level dataset"

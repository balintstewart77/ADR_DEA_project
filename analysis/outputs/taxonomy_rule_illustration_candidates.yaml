      evidence:
        - project_id: "2025/222"
          title: "Community Leisure Activities as a Primary Prevention Tool for Youth Anxiety and Depression (CLASP)"
          datasets_used: "Unknown / Unspecified: Longitudinal Study of young people in England | Office for National Statistics: Longitudinal Business Database | Office for National Statistics: Annual Respondents Database 2 | Office for National Statistics: Annual Respondents Database X"
      caution: >-
        This is borderline because the known listed datasets may be enough for the author to
        infer a linkage mode.
  candidate_counterexamples:

# Candidate rule illustrations for taxonomy author review.
# Source register: cleaned dea_accredited_projects_20260325.csv via analysis.register_cleaning.clean_register_dataframe.
# These are not validated project-level classifications and should not be copied
# directly into the taxonomy dictionary without author review.
# Caution fields, where present, are review scaffolding only.
# They must not be copied into taxonomy_data_dictionary.yaml.
# Substantive boundary guidance should be folded into rationale before any
# illustration is promoted into the dictionary.
- label: "Labour Market & Employment"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is work, employment, earnings, job quality, workforce retention, or
        movement into, through, or out of work.
      rationale: >-
        This illustrates the domain because the substantive phenomenon is labour-market
        participation or workforce dynamics, not merely because employment vocabulary appears in
        a title.
      evidence:
        - project_id: "2019/003"
          title: "The fall of the labour share and rise of the superstar region - Labour share and earning in UK regions"
          datasets_used: "Office for National Statistics: Annual Respondents Database"
        - project_id: "2020/111"
          title: "Analysis of teacher pay and retention, and the business cycle"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings & New Earnings Survey"
    - text: >-
        Studies that use education, migration, disability, or other group characteristics to
        examine employment, earnings, job quality, or workforce progression.
      rationale: >-
        The category boundary is set by the outcome being studied. A subgroup can define the
        population, but the domain is labour-market research when work or earnings are the
        central object. If education, migration, disability, or another characteristic also
        matters, that should be treated as possible co-domain or tag context rather than as the
        reason for this labour-market illustration.
      evidence:
        - project_id: "2022/187"
          title: "Wage progression of low educated workers"
          datasets_used: "Office for National Statistics: Annual Business Survey, Annual Survey of Hours and Earnings linked to 2011 Census, Business Enterprise Research and Development"
        - project_id: "2020/010"
          title: "Local labour market effects of immigration"
          datasets_used: "Office for National Statistics: Annual Population Survey, Quarterly Labour Force Survey & Annual Survey of Hours and Earnings | Institute for Economic and Social Research: Understanding Society"
  candidate_counterexamples:
    - text: >-
        Studies whose object is household resources, saving, debt, wealth, or living standards,
        even where earnings or employment data provide context.
      rationale: >-
        Labour-market data can be supporting evidence without making employment the substantive
        domain. The boundary turns on whether work and workforce dynamics are the research
        object. A project may still have a labour-market co-domain if employment mechanisms are
        substantively analysed, but supporting earnings data alone are not enough.
      instead_consider:
        - "Poverty, Wealth & Living Standards"
      evidence:
        - project_id: "2020/017"
          title: "Subjective wellbeing impacts of debt and debt-related factors"
          datasets_used: "Office for National Statistics: Wealth and Assets Survey"
        - project_id: "2019/015"
          title: "Understanding saving behaviour in the UK"
          datasets_used: "Office for National Statistics: Wealth and Assets Survey & Annual Survey of Hours and Earnings"
- label: "Education & Skills"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is educational participation, admissions, attainment,
        qualifications, learner progression, or movement through education systems.
      rationale: >-
        These cases illustrate the category because the education system or learning pathway is
        the substantive setting and outcome space.
      evidence:
        - project_id: "2020/008"
          title: "Contextualised Admissions and University Choice"
          datasets_used: "UCAS: Universities and Colleges Admissions Service"
        - project_id: "2021/074"
          title: "Identifying effective post-16 education pathways to Level 2 and Level 3 achievement, for learners with a 3 or below in Maths and/or English at KS4"
          datasets_used: "DfE, DWP and HMRC: LEO via SRS Iteration 1 Standard Extract"
    - text: >-
        Studies whose object is skills formation, training provision, apprenticeship pathways,
        or the relationship between education routes and later progression.
      rationale: >-
        The category applies to the training or skills system itself, even where later
        labour-market outcomes are part of the evidence base. If the same research also
        evaluates a named levy or programme, that affects the analytical purpose rather than
        displacing the education and skills domain.
      evidence:
        - project_id: "2020/059"
          title: "An evaluation of the Apprenticeships Levy using firm level data"
          datasets_used: "Department for Education: Employer Skills Surveys"
        - project_id: "2020/022"
          title: "Digital skills in medium and associate professional job roles: An analysis of institutional data from English apprenticeship standard"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings"
  candidate_counterexamples:
    - text: >-
        Studies of wages or employment progression where education level is only a worker
        characteristic or subgroup definition.
      rationale: >-
        Educational attainment can describe a population without making the education system the
        object of study. This can become a dual-domain case only where the education-to-work
        pathway itself is part of the research object.
      instead_consider:
        - "Labour Market & Employment"
      evidence:
        - project_id: "2022/187"
          title: "Wage progression of low educated workers"
          datasets_used: "Office for National Statistics: Annual Business Survey, Annual Survey of Hours and Earnings linked to 2011 Census, Business Enterprise Research and Development"
- label: "Health & Social Care"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is health status, illness, clinical outcomes, hospital use, care
        needs, or social-care outcomes.
      rationale: >-
        The category is illustrated when the research question is about health or care outcomes,
        even if social, housing, or demographic factors are analysed as exposures.
      evidence:
        - project_id: "2019/020"
          title: "Housing, family and environmental risk factors for hospital admissions in children"
          datasets_used: "Office for National Statistics: Death Registrations & Census 2011: Household Sample"
        - project_id: "2019/021"
          title: "Social and Economic Predictors of the severe mental disorders, the SEP-MD study. Analysis of linked data from southeast London, UK"
          datasets_used: "Office for National Statistics: Census 2011 & Death Registrations"
    - text: >-
        Studies linking education, demographic, or administrative records to understand mental
        health, physical health, care pathways, or service use.
      rationale: >-
        Cross-domain data do not change the substantive domain when the outcome being explained
        is health or care. The illustration should not imply that a cross-domain
        education-health product has only a health domain; it illustrates this domain only where
        health or care is the research object.
      evidence:
        - project_id: "2025/184"
          title: "How do mental and physical health problems contribute to inequalities in persistent school absence?A mediation analysis using Education and Child Health Insights from Linked Data (ECHILD)."
          datasets_used: "NHS; DfE: Education and Child Health Insights from Linked Data Research Database - England"
        - project_id: "2025/185"
          title: "High-intensity Emergency department use and mental health in young people (aged 10-25): a longitudinal data linkage study using administrative data from England"
          datasets_used: "NHS; DfE: Education and Child Health Insights from Linked Data Research Database - England"
  candidate_counterexamples:
    - text: >-
        Studies using mortality as a population-composition or migration-comparison measure
        rather than as a clinical, care, or public-health outcome.
      rationale: >-
        Mortality evidence can support demographic research. The health domain boundary depends
        on whether illness, care, or health outcomes are the object of analysis. A full proposal
        could still reveal a health-outcomes framing, so this is a boundary pattern rather than
        a project-level classification.
      instead_consider:
        - "Migration & Demographics"
      evidence:
        - project_id: "2024/027"
          title: "Mortality of immigrants and their descendants in two destination contexts: Using administrative data to compare England and Wales to Norway"
          datasets_used: "Office for National Statistics: ONS Longitudinal Study - England and Wales"
- label: "Crime & Justice"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is victimisation, offending, policing, courts, sentencing,
        imprisonment, probation, reoffending, or criminal records.
      rationale: >-
        These are justice-system or criminal-behaviour phenomena, which are the substantive
        objects covered by the category.
      evidence:
        - project_id: "2019/006"
          title: "Analysis of victimisation data from the Crime Survey for England and Wales"
          datasets_used: "Office for National Statistics: Crime Survey for England and Wales"
        - project_id: "2021/038"
          title: "Using linked Magistrates and Crown Court data to explore defendant appearance over time: specialisation, escalation or de-escalation?"
          datasets_used: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, MoJ Data First Linked Criminal Courts defendant case level dataset & MoJ Data First magistrates' court defendant case level dataset"
    - text: >-
        Studies following defendants, cases, victims, or offenders through justice processes and
        outcomes.
      rationale: >-
        The category is illustrated by the legal or justice-system pathway being studied, not
        simply by the use of administrative data. The same evidence may also illustrate
        service-system analysis or within-domain linkage, but those are separate layer
        decisions.
      evidence:
        - project_id: "2021/041"
          title: "Ethnic inequalities in the Criminal Justice System"
          datasets_used: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, MoJ Data First Linked Criminal Courts defendant case level dataset & MoJ Data First magistrates' court defendant case level dataset"
        - project_id: "2022/023"
          title: "Universal Credit and Criminal Recidivism"
          datasets_used: "Ministry of Justice: MoJ Data First magistrates' court defendant case level dataset, MoJ Data First Prisoner Custodial Journey, MoJ Data First Linked Criminal Courts, Prisons, and Probation, MoJ Data First Crown Court Defendant, MoJ Data First Probation"
  candidate_counterexamples:
    - text: >-
        Studies about harm, vulnerability, substance misuse, or high-risk groups where the
        outcome is health, wellbeing, or support need rather than crime or justice-system
        involvement.
      rationale: >-
        Harm or risk language can resemble public-safety research, but the Crime & Justice
        domain requires criminal behaviour, victimisation, legal proceedings, or justice-system
        outcomes to be central.
      instead_consider:
        - "Health & Social Care"
      evidence:
        - project_id: "2026/008"
          title: "Exploring the Impact of Substance Misuse on Outcomes for High-Risk Young People"
          datasets_used: "SAIL Databank: 2021 Census"
      caution: >-
        Evidence is a near-miss because high-risk youth substance-misuse outcomes can suggest
        public-safety concerns, but the register text does not indicate crime, legal
        proceedings, victimisation, offending, policing, courts, prisons, probation, sentencing,
        or justice-system outcomes.
- label: "Business & Productivity"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is firm behaviour, productivity, innovation, investment, trade,
        exports, entrepreneurship, or business performance.
      rationale: >-
        The category is illustrated when firms or business activity are the substantive unit of
        analysis.
      evidence:
        - project_id: "2019/011"
          title: "Modelling Return on Investment at the firm level"
          datasets_used: "Department for Business, Energy & Industrial Strategy: UK Innovation Survey | Office for National Statistics: Annual Business Survey, Business Enterprise Research and Development, Business Register and Employment Survey"
        - project_id: "2020/024"
          title: "Assessing the impact of UK Enterprise Zones"
          datasets_used: "Office for National Statistics: Annual Respondents Database, Annual Business Survey, Annual Survey of Hours and Earnings, Business Structure Database & Quarterly Labour Force Survey"
    - text: >-
        Studies evaluating how programmes, policies, or economic conditions affect enterprise
        growth, firm performance, investment, or exporting.
      rationale: >-
        The policy or programme may define the analytical design, but the domain is business
        research when firm-level outcomes are central. A programme-evaluation design affects the
        purpose layer; it does not change the domain when firm outcomes are central.
      evidence:
        - project_id: "2019/013"
          title: "TechNation programme evaluation"
          datasets_used: "Office for National Statistics: Business Structure Database"
        - project_id: "2020/002"
          title: "Evaluation of the Energy Entrepreneurs Fund"
          datasets_used: "Office for National Statistics: Business Enterprise Research and Development, Business Structure Database, Annual Business Survey & Annual Survey of Hours and Earnings"
  candidate_counterexamples:
    - text: >-
        Studies of worker skills, occupational roles, or training needs where firms are not the
        main object of analysis.
      rationale: >-
        Skills or workforce data can be relevant to business research, but this domain requires
        firm behaviour, productivity, or business performance to be central. Employer-training
        content may make a case business-relevant, but the domain should not switch unless firm
        behaviour or performance is central.
      instead_consider:
        - "Education & Skills"
        - "Labour Market & Employment"
      evidence:
        - project_id: "2020/022"
          title: "Digital skills in medium and associate professional job roles: An analysis of institutional data from English apprenticeship standard"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings"
- label: "Poverty, Wealth & Living Standards"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is household resources, economic hardship, income distribution,
        wealth, saving, debt, deprivation, or living standards.
      rationale: >-
        These are material-resource phenomena. The category applies because the research
        concerns household economic conditions rather than employment status alone.
      evidence:
        - project_id: "2020/017"
          title: "Subjective wellbeing impacts of debt and debt-related factors"
          datasets_used: "Office for National Statistics: Wealth and Assets Survey"
        - project_id: "2021/008"
          title: "Income Inequality"
          datasets_used: "Office for National Statistics: Annual Population Survey - Person & Households, Annual Survey of Hours and Earnings"
    - text: >-
        Studies examining austerity, cost-of-living pressures, low-income household debt, or
        resource constraints as lived material conditions.
      rationale: >-
        The boundary is material hardship and household economic position, even when
        labour-market or price data are used as inputs. Labour-market datasets can support this
        research without making work or employment the main domain.
      evidence:
        - project_id: "2023/087"
          title: "Austerity and household debt"
          datasets_used: "Office for National Statistics: Wealth and Assets Survey - Great Britain, Living Costs and Food Survey - UK"
        - project_id: "2025/205"
          title: "Cost of Living Crisis in Rural Northern Ireland"
          datasets_used: "Office for National Statistics: Business Register Employment Survey - UK | Living Costs and Food Survey - UK | Labour Force Survey Household - UK | Consumer and Retail Price Index - UK | Annual Survey of Hours and Earnings Longitudinal - UK | Annual Population Survey - UK"
  candidate_counterexamples:
    - text: >-
        Studies whose object is pay, earnings gaps, or labour-market inequality rather than
        household resources or material living standards.
      rationale: >-
        Pay inequality can affect living standards, but the domain boundary should follow the
        central object of study. A demographic-disparities tag may still be relevant where the
        pay comparison is centrally across equality-relevant groups.
      instead_consider:
        - "Labour Market & Employment"
      evidence:
        - project_id: "2021/063"
          title: "Gender Pay Gap"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings, Business Structure Database & Annual Business Survey"
        - project_id: "2022/094"
          title: "Regional UK Gender Pay Gaps"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings UK"
- label: "Housing & Planning"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is housing markets, affordability, tenure, gentrification,
        residential mobility, homelessness, or planning decisions.
      rationale: >-
        The category is illustrated when housing or residential conditions are the substantive
        phenomenon being explained.
      evidence:
        - project_id: "2020/125"
          title: "The Effect of Foreign Investors on Local Housing Markets: Evidence from the UK"
          datasets_used: "Office for National Statistics: Quarterly Labour Force Survey"
        - project_id: "2021/058"
          title: "Gentrification or urban exodus? Understanding the effect of the pandemic on the housing market in the UK"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings"
    - text: >-
        Studies treating the dwelling or residential environment as the mechanism linking
        housing conditions to health, energy use, or place-based outcomes.
      rationale: >-
        The housing domain applies when the condition or use of homes is central, even if the
        measured outcome sits in another domain. If environmental exposure or energy systems are
        the main object, the Environment & Agriculture domain may be the stronger fit.
      evidence:
        - project_id: "2020/058"
          title: "Movers and stayers: explaining variation in residential energy consumption using longitudinal observations of annual energy consumption in moving households"
          datasets_used: "Department for Business, Energy and Industrial Strategy: Annual gas and electricity consumption at the meter level"
        - project_id: "2025/152"
          title: "The impact of housing conditions on children with asthma"
          datasets_used: "SAIL Databank: Census 2021"
  candidate_counterexamples:
    - text: >-
        Studies where home is only the location of pandemic behaviour, remote activity, or
        public-health guidance.
      rationale: >-
        The word home should not trigger this domain unless housing quality, tenure, residential
        conditions, or planning are the research object.
      instead_consider:
        - "COVID-19 & Pandemic"
      evidence:
        - project_id: "2020/056"
          title: "Factors Predicting Adherence Stay at Home Guidance During COVID-19 Pandemic in the United Kingdom"
          datasets_used: "Office for National Statistics: Coronavirus and the social impacts on Great Britain"
- label: "Migration & Demographics"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is migration flows, migrant integration, immigration policy,
        population movement, or differences between migrant and non-migrant populations.
      rationale: >-
        These cases concern population movement and demographic composition, which are the core
        objects of the domain. If labour-market outcomes are central, this may become a
        co-domain rather than replacing the demographic domain.
      evidence:
        - project_id: "2019/026"
          title: "Migration Observatory analysis of EU and non-EU migration in the UK"
          datasets_used: "Office for National Statistics: Annual Population Survey, Annual Population Survey & Labour Force Survey"
        - project_id: "2020/010"
          title: "Local labour market effects of immigration"
          datasets_used: "Office for National Statistics: Annual Population Survey, Quarterly Labour Force Survey & Annual Survey of Hours and Earnings | Institute for Economic and Social Research: Understanding Society"
    - text: >-
        Studies whose object is population structure or change, including mobility, fertility,
        ageing, mortality as a demographic outcome, or cohort composition.
      rationale: >-
        The category is illustrated when the research asks about how populations are composed or
        change over time.
      evidence:
        - project_id: "2020/028"
          title: "Population mobility and housing dynamics in the 21st Century"
          datasets_used: "Office for National Statistics: Annual Population Survey & Labour Force Survey"
        - project_id: "2024/027"
          title: "Mortality of immigrants and their descendants in two destination contexts: Using administrative data to compare England and Wales to Norway"
          datasets_used: "Office for National Statistics: ONS Longitudinal Study - England and Wales"
  candidate_counterexamples:
    - text: >-
        Studies comparing outcomes by ethnicity, nationality, or other demographic
        characteristics within a labour, justice, health, or education question.
      rationale: >-
        Demographic subgroup comparison is not the same as studying population structure,
        migration, or demographic change. The demographic-disparities/equity tag may still apply
        where the group comparison is central.
      instead_consider:
        - "Crime & Justice"
        - "Labour Market & Employment"
      evidence:
        - project_id: "2021/041"
          title: "Ethnic inequalities in the Criminal Justice System"
          datasets_used: "Ministry of Justice: MoJ Data First Crown court defendant case level dataset, MoJ Data First Linked Criminal Courts defendant case level dataset & MoJ Data First magistrates' court defendant case level dataset"
        - project_id: "2023/058"
          title: "Differences in careers by ethnicity, nationality, and social class."
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings linked to 2011 Census - England and Wales"
- label: "Environment & Agriculture"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is energy consumption, climate policy, decarbonisation,
        environmental exposure, pollution, or environmental impacts.
      rationale: >-
        These cases concern the natural environment, climate, or energy systems rather than a
        generic social or economic context. Residential energy cases may also involve housing,
        but this domain is illustrated when energy or environmental mechanisms are central.
      evidence:
        - project_id: "2020/058"
          title: "Movers and stayers: explaining variation in residential energy consumption using longitudinal observations of annual energy consumption in moving households"
          datasets_used: "Department for Business, Energy and Industrial Strategy: Annual gas and electricity consumption at the meter level"
        - project_id: "2020/099"
          title: "Estimation of energy demand drivers and the effect of public policies on consumption under the climate emergency"
          datasets_used: "Department for Business, Energy & Industrial Strategy: National Energy Efficiency data | Office for National Statistics: Annual Respondents Database, Annual Respondents Database, Annual Business Survey, Annual Survey of Hours and Earnings, Products of the European Community, Business Structure Database, Longitudinal Business Structure ..."
    - text: >-
        Studies whose object is farming, farm households, agricultural production, land use, or
        agricultural administrative data.
      rationale: >-
        Agriculture and land-use research belongs in this domain because farming or
        environmental resource use is the substantive object.
      evidence:
        - project_id: "2025/144"
          title: "Group 3, Grouped objectAD|ARC (Administrative Data AgriResearch Collection) Phase 1 and Phase 2 Analysis: Linking Individual and Farm Level Data for Agricultural Research"
          datasets_used: "Department for Environment, Food & Rural Affairs: Bespoke Admin Data - Agricultural Research Collection Phase 1 - England, | Bespoke Admin Data - Agricultural Research Collection Phase 2 - England, | AD|ARC Phase 2 - Census 21 unlinked, | Office for National Statistics: | Business Structure Database"
        - project_id: "2025/149"
          title: "Farm household Resilience, Income Source and Earnings (FARM-RISE)"
          datasets_used: "SAIL Databank: Census 2011"
  candidate_counterexamples:
    - text: >-
        Studies using environment to mean a social, economic, family, or institutional context
        rather than the natural environment.
      rationale: >-
        The category excludes non-natural-environment uses of environment unless climate,
        energy, land, pollution, agriculture, or ecological exposure is central.
      instead_consider:
        - "Poverty, Wealth & Living Standards"
        - "Education & Skills"
      evidence:
        - project_id: "2019/023"
          title: "Economic environment and child development"
          datasets_used: "Office for National Statistics: Labour Force Survey"
      caution: >-
        Evidence may be too title-dependent; full project text could reveal environmental
        exposure not visible in the register summary.
- label: "Public Finance & Taxation"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies whose object is taxation, tax credits, fiscal transfers, public expenditure,
        business rates, public spending, or revenue mechanisms.
      rationale: >-
        The category is illustrated by public-finance instruments or fiscal mechanisms being the
        subject of the research.
      evidence:
        - project_id: "2020/001"
          title: "How does tax affect incorporation and business outcomes?"
          datasets_used: "Department for Business, Energy and Industrial Strategy: Longitudinal Small Business Survey & Small Business Survey"
        - project_id: "2020/067"
          title: "Inequalities in the 21st Century: Transfers, tax and tax credits"
          datasets_used: "Office for National Statistics: Annual Population Survey Person, Annual Population Survey Household, Occupational differences in mortality from COVID-19, | Annual Survey of Hours and Earnings, Labour Force Survey Household, Labour Force Survey Person, Business Structure Database & Labour Force Survey Longitudinal"
    - text: >-
        Studies evaluating how a tax, contribution, relief, levy, subsidy, or rates scheme
        affects households, firms, or places.
      rationale: >-
        The fiscal design is the central mechanism, even where the measured outcomes are
        employment, business, or household outcomes. Multi-domain outcomes do not displace this
        domain where the fiscal mechanism is the object of study.
      evidence:
        - project_id: "2022/077"
          title: "Employment Allowance National Insurance Contribution Evaluation"
          datasets_used: "Office for National Statistics: ASHE Longitudinal Data England, Wales, Great Britain"
        - project_id: "2020/003"
          title: "Spatial sorting in housing and employment: impact of public investments, planning decisions, housing subsidies, and business rates"
          datasets_used: "Office for National Statistics: Annual Survey of Hours and Earnings, Census 2011 England and Wales: Individual Sample, Census 2011 Origin/Destination: Flow data & Business Impact of COVID-19 Survey"
  candidate_counterexamples:
    - text: >-
        Studies of private debt, saving, wealth, or household finances without a tax, benefit,
        spending, or fiscal-policy mechanism.
      rationale: >-
        Household financial circumstances are not public finance unless a public revenue or
        expenditure mechanism is central.
      instead_consider:
        - "Poverty, Wealth & Living Standards"
      evidence:
        - project_id: "2020/017"
          title: "Subjective wellbeing impacts of debt and debt-related factors"
          datasets_used: "Office for National Statistics: Wealth and Assets Survey"
      caution: >-
        Full project text should be checked for hidden benefit, tax-credit, or fiscal-transfer
        mechanisms before using this as a counterexample.
- label: "COVID-19 & Pandemic"
  layer: "Layer A -- domain"
  candidate_examples:
    - text: >-
        Studies where pandemic infection, surveillance, vaccination, containment, or control
        processes are the substantive research object.
      rationale: >-
        This illustrates the event-domain because COVID-19 is the surveillance object or
        intervention context being studied, not merely the period in which data were collected.
        Because this is an event-domain, a substantive co-domain may also be needed where the
        pandemic is studied through health, labour, business, education, or household outcomes.
      evidence:
        - project_id: "2020/027"
          title: "COVID-19 Infection Survey"
          datasets_used: "Office for National Statistics: ONS COVID-19 Weekly Opinions Survey, Labour Force Survey, ONS Death Registrations Data | Office for National Statistics / University of Oxford / Valuation Office Agency / Ministry of Housing, Communities and Local Government: Covid-19 Infection Survey linked with VOA and EPC data | Office for National S ..."
        - project_id: "2020/063"
          title: "Identifying flare ups of the COVID-19 infection across the UK"
          datasets_used: "Office for National Statistics: COVID-19 Weekly Opinions Survey, Labour Force Survey, ONS Death Registrations Data, 2020 Wave 1 Labour Force Survey | UCAS: Universities and Colleges Admissions Service Data | Office for National Statistics / University of Oxford: COVID-19 Infection Survey"
    - text: >-
        Studies examining how pandemic conditions affected health, work, business, education,
        inequalities, households, or public services.
      rationale: >-
        This remains in scope where the pandemic is the substantive exposure, context, or
        outcome frame. The key boundary is that pandemic conditions structure the research
        question; the substantive co-domain should be reviewed separately.
      evidence:
        - project_id: "2020/081"
          title: "Occupational differences in mortality from Covid-19"
          datasets_used: "Office for National Statistics: Annual Population Survey, Death registration data Provisional Monthly Extracts & Death Registrations England and Wales"
        - project_id: "2021/015"
          title: "Inequalities in the economic impact of COVID-19 pandemic on residents and businesses in Hackney and the City of London"
          datasets_used: "Office for National Statistics: Business Impact of | COVID-19 | Survey, Census 2011 England and Wales: Household | structure for | COVID-19 | models, Coronavirus and the social | impacts on Great Britain, Covid-19 | Infection Survey, Effects of Tax and Benefits, Labour Force Survey | , Labour Force Survey | , Linked Census and death ..."
  candidate_counterexamples:
    - text: >-
        Studies where COVID-19 is only a date range, background period, excluded cause, or
        incidental context for otherwise non-pandemic research.
      rationale: >-
        This falls outside the event-domain when COVID-19 is not the exposure, surveillance
        object, intervention context, substantive outcome frame, or central pandemic condition
        being studied.
      instead_consider:

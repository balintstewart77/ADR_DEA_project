  candidate_counterexamples:
    - text: >-
        Studies using longitudinal data to estimate one exposure-outcome relationship without
        analysing extended progression or sequence.
      rationale: >-
        Longitudinal data are not sufficient; the purpose depends on whether trajectories or
        life-stage movement are central.
      instead_consider:
        - "Outcome Tracking"
      evidence:
        - project_id: "2019/005"
          title: "Measuring the impact of hearing loss on well-being"
          datasets_used: "Office for National Statistics: Annual Population Survey"
        - project_id: "2025/185"
          title: "High-intensity Emergency department use and mental health in young people (aged 10-25): a longitudinal data linkage study using administrative data from England"
          datasets_used: "NHS; DfE: Education and Child Health Insights from Linked Data Research Database - England"
      caution: >-
        The full design may still involve repeated trajectories; title evidence alone is not
        definitive.
- label: "Service Interaction / Systems Analysis"
  layer: "Layer C -- purpose"
  candidate_examples:
    - text: >-

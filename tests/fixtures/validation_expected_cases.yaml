  - case_id: perfect_human_model_disagreement
    record_id: SYN-002
    expected: humans agree perfectly and the model disagrees on both set dimensions
  - case_id: boundary_model_matches_two
    record_id: SYN-003
    expected: model matches coders A and B but not coder C
  - case_id: boundary_model_matches_one
    record_id: SYN-005
    coder_values: [A, B, B]
    model_value: A
    expected_model_matches: 1
  - case_id: subset_overlap_masi
    record_id: SYN-006
    left: [A]
    right: [A, B]
    expected_jaccard: 1/2
    expected_masi: 1/3
  - case_id: missing_coder_dimension
    record_id: SYN-004
    expected_missing_slot: C
  - case_id: broad_not_strict
    record_id: SYN-007
    sufficiency: [Sufficient, Partially sufficient, Insufficient]
    expected_broad: true
    expected_strict: false
  - case_id: majority_insufficient_retained_primary
    record_id: SYN-008
    sufficiency: [Insufficient, Insufficient, Sufficient]

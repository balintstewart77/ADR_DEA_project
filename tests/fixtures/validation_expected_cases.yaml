    record_id: SYN-009
    coder_sets: [[Rare label], [Rare label], []]
    expected_human_supported: true
    expected_support_count: 1
    expected_support_band: fewer_than_10
  - case_id: undefined_binary_zero_variation
    record_id: SYN-010
    units: [[0, 0, 0], [0, 0, 0]]
    expected_alpha_valid: false
    expected_reason: expected_disagreement_zero
  - case_id: candidate_0_4_taxonomy_fit_values
    record_id: SYN-011
    values: [Fit, Partial Fit, No Fit, Cannot assess from register entry]
    expected_valid_value_count: 4
  - case_id: cannot_assess_not_taxonomy_defect
    record_id: SYN-012
    values: [Fit, Partial Fit, No Fit, Cannot assess from register entry]
    expected_taxonomy_issue_denominator: 2
